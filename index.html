<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>General desEchos v2.0 - Dub Station</title>
    <style>
        /* --- SYSTEM CORE --- */
        body {
            background-color: #004488;
            background-image: linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: "Courier New", monospace;
            margin: 0;
            padding: 20px 0 140px 0;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        header {
            border: 4px double #ffffff;
            background: #222;
            padding: 15px;
            text-align: center;
            box-shadow: 6px 6px 0px #000;
            margin: 0 15px 30px 15px;
        }

        h1 { color: #ffffff; margin: 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; }

        .bolt { position: absolute; width: 8px; height: 8px; background: #888; border-radius: 50%; border: 1px solid #444; }
        .tl { top: 6px; left: 6px; } .tr { top: 6px; right: 6px; } .bl { bottom: 6px; left: 6px; } .br { bottom: 6px; right: 6px; }

        /* --- MIXER SECTION --- */
        .mixer-console {
            background: #a0a0a0;
            border: 8px outset #ccc;
            max-width: 900px;
            margin: 0 auto 30px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            position: relative;
        }

        .channel-strip {
            background: #888;
            border: 2px inset #666;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fader-track { height: 150px; width: 30px; background: #222; position: relative; margin: 10px 0; border: 2px solid #444; }
        .fader-handle { width: 40px; height: 20px; background: #ddd; border: 2px outset #fff; cursor: pointer; position: absolute; left: -7px; }

        .send-btn {
            width: 100%; margin: 3px 0; padding: 5px; font-size: 10px; font-weight: bold;
            cursor: pointer; border: 3px outset #aaa; background: #555; color: #fff;
        }
        .send-btn.active-echo { background: #00ff00; color: #000; }
        .send-btn.active-filter { background: #ffcc00; color: #000; }

        /* --- BIG KNOB UI --- */
        .filter-unit {
            background: #222; color: #fff; padding: 20px; border: 6px outset #444;
            text-align: center; grid-column: span 1; display: flex; flex-direction: column; align-items: center;
        }
        .rotary-container {
            width: 120px; height: 120px; background: #333; border-radius: 50%;
            border: 4px solid #555; position: relative; margin: 15px auto;
            cursor: pointer; transition: transform 0.2s;
        }
        .knob-indicator {
            width: 4px; height: 30px; background: #ff0000; position: absolute;
            top: 10px; left: 58px; transform-origin: center 50px;
        }
        .frequency-label { font-size: 12px; color: #ffcc00; margin-top: 10px; font-weight: bold; }

        /* --- MASTER CONTROLS --- */
        .master-section {
            text-align: center; padding: 20px; background: #333; border: 4px inset #555; margin-top: 10px;
        }
        .master-fire {
            padding: 15px 40px; font-size: 1.2rem; background: #880000; color: white;
            border: 4px outset #ff0000; cursor: pointer; font-family: "Courier New", monospace;
        }
        .master-fire.playing { background: #008800; border-color: #00ff00; }

        /* --- SIREN & PREVIOUS BOXES --- */
        .seg1-unit {
            background: #c0c0c0; border: 6px outset #eee; color: #222;
            max-width: 340px; margin: 0 auto 30px auto; padding: 20px; position: relative;
        }
        .fire-button {
            width: 60px; height: 60px; background: radial-gradient(circle, #ff0000, #880000);
            border: 5px outset #ff6666; border-radius: 50%; cursor: pointer; margin: 0 auto 15px auto; display: block;
        }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100vw; background: #c0c0c0;
            border-top: 5px outset #fff; padding: 10px 15px; box-sizing: border-box; z-index: 9999; height: 100px;
        }
        .vu-meter { display: flex; gap: 3px; height: 25px; background: #000; padding: 4px; border: 3px inset #808080; }
        .led { flex: 1; background: #222; }
        .led.green.on { background: #33ff33; box-shadow: 0 0 8px #00ff00; }
        .led.yellow.on { background: #ffff33; box-shadow: 0 0 8px #ffff00; }
        .led.red.on { background: #ff3333; box-shadow: 0 0 8px #ff0000; }
    </style>
</head>
<body>

<header>
    <h1>General desEchos v2.0</h1>
</header>

<main>
    <section class="mixer-console">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        
        <div class="channel-strip">
            <span style="font-size:10px; font-weight:bold;">CH 1</span>
            <div class="fader-track"><input type="range" class="fader-handle" orient="vertical" min="0" max="1" step="0.01" value="0.7" oninput="updateVol(0, this.value)"></div>
            <button class="send-btn" onclick="toggleSend(0, 'echo', this)">ECHO</button>
            <button class="send-btn" onclick="toggleSend(0, 'filter', this)">FILTER</button>
            <audio id="audio0" loop><source src="audio1.mp3" type="audio/mpeg"></audio>
        </div>

        <div class="channel-strip">
            <span style="font-size:10px; font-weight:bold;">CH 2</span>
            <div class="fader-track"><input type="range" class="fader-handle" orient="vertical" min="0" max="1" step="0.01" value="0.7" oninput="updateVol(1, this.value)"></div>
            <button class="send-btn" onclick="toggleSend(1, 'echo', this)">ECHO</button>
            <button class="send-btn" onclick="toggleSend(1, 'filter', this)">FILTER</button>
            <audio id="audio1" loop><source src="audio2.mp3" type="audio/mpeg"></audio>
        </div>

        <div class="channel-strip">
            <span style="font-size:10px; font-weight:bold;">CH 3</span>
            <div class="fader-track"><input type="range" class="fader-handle" orient="vertical" min="0" max="1" step="0.01" value="0.7" oninput="updateVol(2, this.value)"></div>
            <button class="send-btn" onclick="toggleSend(2, 'echo', this)">ECHO</button>
            <button class="send-btn" onclick="toggleSend(2, 'filter', this)">FILTER</button>
            <audio id="audio2" loop><source src="audio3.mp3" type="audio/mpeg"></audio>
        </div>

        <div class="channel-strip">
            <span style="font-size:10px; font-weight:bold;">CH 4</span>
            <div class="fader-track"><input type="range" class="fader-handle" orient="vertical" min="0" max="1" step="0.01" value="0.7" oninput="updateVol(3, this.value)"></div>
            <button class="send-btn" onclick="toggleSend(3, 'echo', this)">ECHO</button>
            <button class="send-btn" onclick="toggleSend(3, 'filter', this)">FILTER</button>
            <audio id="audio3" loop><source src="audio4.mp3" type="audio/mpeg"></audio>
        </div>

        <div class="filter-unit">
            <span style="font-size:10px; font-weight:bold; letter-spacing:1px;">ALTEC TYPE 9067</span>
            <div class="rotary-container" id="bigKnob" onclick="rotateKnob()">
                <div class="knob-indicator" id="knobPointer"></div>
            </div>
            <div class="frequency-label" id="freqDisplay">OFF (0 Hz)</div>
            <div style="font-size:8px; margin-top:5px;">HIGH PASS SELECTOR</div>
        </div>

        <div class="master-section" style="grid-column: 1 / -1;">
            <button id="masterPlay" class="master-fire" onclick="toggleAllAudio()">START ENGINE</button>
            <div style="font-size:9px; margin-top:10px; color:#aaa;">MASTER SYNC PROTOCOL v2.0</div>
        </div>
    </section>

    <section class="seg1-unit">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div style="background:#333; color:#fc0; text-align:center; font-size:10px; padding:5px; margin-bottom:10px;">SE-G1 SIREN MODULE</div>
        <div id="fireBtn" class="fire-button"></div>
        <input type="range" id="pitchKnob" min="100" max="1500" value="440" style="width:100%;">
    </section>
</main>

<footer>
    <div style="color:#000; font-size:10px; font-weight:bold; margin-bottom:5px; text-transform: uppercase;">Signal Monitor</div>
    <div class="vu-meter" id="vu"></div>
</footer>

<script>
    let audioCtx, analyser;
    let isPlaying = false;

    // Filter frequencies (12 positions similar to Altec)
    const filterFreqs = [0, 70, 100, 150, 250, 500, 800, 1000, 2000, 3000, 5000, 8000];
    let currentFilterIdx = 0;

    // Effect Nodes
    let delayNode, feedbackNode, filterNode1, filterNode2;

    // Channel Data
    const channels = [
        { id: 'audio0', gain: null, echoOn: false, filterOn: false, source: null, echoBus: null, filterBus: null },
        { id: 'audio1', gain: null, echoOn: false, filterOn: false, source: null, echoBus: null, filterBus: null },
        { id: 'audio2', gain: null, echoOn: false, filterOn: false, source: null, echoBus: null, filterBus: null },
        { id: 'audio3', gain: null, echoOn: false, filterOn: false, source: null, echoBus: null, filterBus: null }
    ];

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();

        // Setup Echo
        delayNode = audioCtx.createDelay(2.0);
        delayNode.delayTime.value = 0.4;
        feedbackNode = audioCtx.createGain();
        feedbackNode.gain.value = 0.5;
        delayNode.connect(feedbackNode);
        feedbackNode.connect(delayNode);
        delayNode.connect(analyser);

        // Setup Dual High Pass (The "Big Knob" Filter)
        filterNode1 = audioCtx.createBiquadFilter();
        filterNode2 = audioCtx.createBiquadFilter();
        filterNode1.type = filterNode2.type = 'highpass';
        filterNode1.Q.value = 1.5; // Resonant peak
        filterNode1.connect(filterNode2);
        filterNode2.connect(analyser);

        analyser.connect(audioCtx.destination);

        // Setup Channels
        channels.forEach((ch, index) => {
            const el = document.getElementById(ch.id);
            ch.source = audioCtx.createMediaElementSource(el);
            ch.gain = audioCtx.createGain();
            ch.echoBus = audioCtx.createGain();
            ch.filterBus = audioCtx.createGain();
            
            ch.echoBus.gain.value = 0;
            ch.filterBus.gain.value = 0;

            ch.source.connect(ch.gain);
            ch.gain.connect(analyser); // Direct to Master
            
            ch.gain.connect(ch.echoBus);
            ch.echoBus.connect(delayNode);

            ch.gain.connect(ch.filterBus);
            ch.filterBus.connect(filterNode1);
        });

        startVUMeter();
    }

    function toggleAllAudio() {
        initAudio();
        const btn = document.getElementById('masterPlay');
        if (!isPlaying) {
            channels.forEach(ch => document.getElementById(ch.id).play());
            btn.innerText = "HALT ENGINE";
            btn.classList.add('playing');
            isPlaying = true;
        } else {
            channels.forEach(ch => document.getElementById(ch.id).pause());
            btn.innerText = "START ENGINE";
            btn.classList.remove('playing');
            isPlaying = false;
        }
    }

    function updateVol(idx, val) {
        if (channels[idx].gain) channels[idx].gain.gain.value = val;
    }

    function toggleSend(idx, type, btn) {
        initAudio();
        if (type === 'echo') {
            channels[idx].echoOn = !channels[idx].echoOn;
            channels[idx].echoBus.gain.value = channels[idx].echoOn ? 0.8 : 0;
            btn.classList.toggle('active-echo');
        } else {
            channels[idx].filterOn = !channels[idx].filterOn;
            channels[idx].filterBus.gain.value = channels[idx].filterOn ? 1 : 0;
            btn.classList.toggle('active-filter');
            // When filter is on, we reduce direct signal for the "Dub" feel
            channels[idx].gain.gain.setTargetAtTime(channels[idx].filterOn ? 0.2 : 0.7, audioCtx.currentTime, 0.1);
        }
    }

    function rotateKnob() {
        initAudio();
        currentFilterIdx = (currentFilterIdx + 1) % filterFreqs.length;
        const freq = filterFreqs[currentFilterIdx];
        const angle = (currentFilterIdx * 30); // 12 positions = 360/12

        document.getElementById('knobPointer').style.transform = `rotate(${angle}deg)`;
        document.getElementById('freqDisplay').innerText = freq === 0 ? "OFF (0 Hz)" : freq + " Hz";

        // Update Filters
        filterNode1.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
        filterNode2.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
    }

    // VU Meter Logic
    function startVUMeter() {
        const vuContainer = document.getElementById('vu');
        const leds = [];
        for(let i=0; i<24; i++) {
            const led = document.createElement('div');
            led.className = 'led ' + (i < 14 ? 'green' : i < 20 ? 'yellow' : 'red');
            vuContainer.appendChild(led);
            leds.push(led);
        }

        function draw() {
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            const volume = data.reduce((a,b) => a+b) / data.length;
            const litLeds = Math.floor((volume / 140) * leds.length);
            leds.forEach((led, i) => led.classList.toggle('on', i < litLeds));
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
