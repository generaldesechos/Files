<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>General desEchos v2.1</title>
    <style>
        /* --- SYSTEM CORE --- */
        body {
            background-color: #004488;
            background-image: linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: "Courier New", monospace;
            margin: 0;
            padding: 10px 0 120px 0;
            overflow-x: hidden;
        }

        header {
            border: 4px double #ffffff;
            background: #222;
            padding: 10px;
            text-align: center;
            box-shadow: 4px 4px 0px #000;
            margin: 10px;
        }

        h1 { font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; margin: 0; }

        .bolt { position: absolute; width: 6px; height: 6px; background: #888; border-radius: 50%; border: 1px solid #444; }
        .tl { top: 5px; left: 5px; } .tr { top: 5px; right: 5px; } .bl { bottom: 5px; left: 5px; } .br { bottom: 5px; right: 5px; }

        /* --- SIREN UNIT (RESTORED) --- */
        .seg1-unit {
            background: #c0c0c0; border: 5px outset #eee; color: #222;
            max-width: 360px; margin: 15px auto; padding: 15px; position: relative;
        }
        .unit-label { background: #333; color: #ffcc00; padding: 4px; text-align: center; font-weight: bold; font-size: 11px; margin-bottom: 10px; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .knob-container { text-align: center; font-size: 9px; font-weight: bold; }
        input[type=range] { width: 100%; accent-color: #800; }

        .fire-button {
            width: 70px; height: 70px; background: radial-gradient(circle, #ff0000, #880000);
            border: 4px outset #ff6666; border-radius: 50%; cursor: pointer; margin: 0 auto 10px auto; display: block;
        }

        /* --- MIXER SECTION --- */
        .mixer-container {
            max-width: 500px; margin: 20px auto; background: #999; border: 6px outset #bbb; padding: 10px; position: relative;
        }
        .mixer-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; /* 2x2 on mobile */
        }
        .channel-strip {
            background: #777; border: 2px inset #555; padding: 8px; text-align: center;
        }
        .fader-box { height: 100px; padding: 10px 0; }
        .vert-fader { appearance: slider-vertical; width: 25px; height: 80px; }

        .send-row { display: flex; gap: 4px; margin-top: 5px; }
        .s-btn { flex: 1; font-size: 8px; padding: 4px 0; border: 2px outset #aaa; background: #444; color: #fff; cursor: pointer; }
        .s-btn.active-e { background: #00ff00; color: #000; }
        .s-btn.active-f { background: #ffcc00; color: #000; }

        /* --- BIG KNOB (KING TUBBY STYLE) --- */
        .big-knob-panel {
            grid-column: span 2; background: #222; border: 4px inset #444; padding: 10px; margin-top: 10px; text-align: center;
        }
        .rotary-dial {
            width: 80px; height: 80px; background: #333; border-radius: 50%; border: 3px solid #666;
            margin: 10px auto; position: relative; cursor: pointer;
        }
        .dial-hand { width: 3px; height: 25px; background: red; position: absolute; top: 15px; left: 38.5px; transform-origin: center 25px; }
        .freq-text { color: #ffcc00; font-size: 14px; font-weight: bold; }

        /* --- MASTER TRANSPORT --- */
        .transport { grid-column: span 2; margin-top: 10px; }
        .play-all { width: 100%; padding: 12px; background: #006600; color: white; border: 4px outset #00aa00; font-weight: bold; }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100vw; background: #c0c0c0;
            border-top: 5px outset #fff; padding: 10px; box-sizing: border-box; height: 90px;
        }
        .vu-meter { display: flex; gap: 2px; height: 20px; background: #000; padding: 3px; border: 2px inset #808080; }
        .led { flex: 1; background: #222; }
        .led.on-g { background: #0f0; box-shadow: 0 0 5px #0f0; }
        .led.on-y { background: #ff0; box-shadow: 0 0 5px #ff0; }
        .led.on-r { background: #f00; box-shadow: 0 0 5px #f00; }

        @media (min-width: 600px) {
            .mixer-grid { grid-template-columns: 1fr 1fr 1fr 1fr; }
            .big-knob-panel { grid-column: span 4; }
            .transport { grid-column: span 4; }
        }
    </style>
</head>
<body>

<header><h1>General desEchos v2.1</h1></header>

<main>
    <section class="seg1-unit">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label">SE-G1 SIREN // TACTICAL AUDIO</div>
        <div class="control-grid">
            <div class="knob-container">PITCH<input type="range" id="pKnob" min="100" max="1500" value="440"></div>
            <div class="knob-container">LFO RATE<input type="range" id="rKnob" min="1" max="40" value="12"></div>
            <div class="knob-container">LFO DEPTH<input type="range" id="dKnob" min="0" max="1500" value="600"></div>
            <div class="knob-container">ECHO FBK<input type="range" id="eKnob" min="0" max="0.9" step="0.1" value="0.5"></div>
        </div>
        <div id="fireBtn" class="fire-button"></div>
    </section>

    <section class="mixer-container">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="mixer-grid">
            <div class="channel-strip">
                <div style="font-size:10px;">CH 1</div>
                <div class="fader-box"><input type="range" class="vert-fader" min="0" max="1" step="0.01" value="0.7" oninput="updateVol(0, this.value)"></div>
                <div class="send-row">
                    <button class="s-btn" onclick="toggleS(0,'e',this)">ECHO</button>
                    <button class="s-btn" onclick="toggleS(0,'f',this)">FLTR</button>
                </div>
                <audio id="aud0" loop><source src="audio1.mp3"></audio>
            </div>
            <div class="channel-strip">
                <div style="font-size:10px;">CH 2</div>
                <div class="fader-box"><input type="range" class="vert-fader" min="0" max="1" step="0.01" value="0.7" oninput="updateVol(1, this.value)"></div>
                <div class="send-row">
                    <button class="s-btn" onclick="toggleS(1,'e',this)">ECHO</button>
                    <button class="s-btn" onclick="toggleS(1,'f',this)">FLTR</button>
                </div>
                <audio id="aud1" loop><source src="audio2.mp3"></audio>
            </div>
            <div class="channel-strip">
                <div style="font-size:10px;">CH 3</div>
                <div class="fader-box"><input type="range" class="vert-fader" min="0" max="1" step="0.01" value="0.7" oninput="updateVol(2, this.value)"></div>
                <div class="send-row">
                    <button class="s-btn" onclick="toggleS(2,'e',this)">ECHO</button>
                    <button class="s-btn" onclick="toggleS(2,'f',this)">FLTR</button>
                </div>
                <audio id="aud2" loop><source src="audio3.mp3"></audio>
            </div>
            <div class="channel-strip">
                <div style="font-size:10px;">CH 4</div>
                <div class="fader-box"><input type="range" class="vert-fader" min="0" max="1" step="0.01" value="0.7" oninput="updateVol(3, this.value)"></div>
                <div class="send-row">
                    <button class="s-btn" onclick="toggleS(3,'e',this)">ECHO</button>
                    <button class="s-btn" onclick="toggleS(3,'f',this)">FLTR</button>
                </div>
                <audio id="aud3" loop><source src="audio4.mp3"></audio>
            </div>

            <div class="big-knob-panel">
                <div style="font-size:10px;">KING TUBBY FILTER</div>
                <div class="rotary-dial" onclick="rotateBigKnob()">
                    <div id="dialHand" class="dial-hand"></div>
                </div>
                <div id="freqLabel" class="freq-text">OFF</div>
            </div>

            <div class="transport">
                <button id="mPlay" class="play-all" onclick="masterToggle()">START ALL TRACKS</button>
            </div>
        </div>
    </section>
</main>

<footer>
    <div style="color:#000; font-size:9px; font-weight:bold; margin-bottom:5px;">SIGNAL MONITOR</div>
    <div class="vu-meter" id="vu"></div>
</footer>

<script>
    let audioCtx, osc, lfo, lfoG, sirenG, delay, feedback, filter1, filter2, analyser;
    let isPlaying = false;
    let currentFreqIdx = 0;
    const freqs = [0, 70, 100, 150, 250, 500, 800, 1000, 2000, 3000, 5000, 8000];
    
    const channels = [
        { id: 'aud0', gain: null, echoG: null, fltrG: null, eOn: false, fOn: false },
        { id: 'aud1', gain: null, echoG: null, fltrG: null, eOn: false, fOn: false },
        { id: 'aud2', gain: null, echoG: null, fltrG: null, eOn: false, fOn: false },
        { id: 'aud3', gain: null, echoG: null, fltrG: null, eOn: false, fOn: false }
    ];

    function setupAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();

        // Echo Unit
        delay = audioCtx.createDelay(2.0);
        delay.delayTime.value = 0.35;
        feedback = audioCtx.createGain();
        feedback.gain.value = 0.5;
        delay.connect(feedback);
        feedback.connect(delay);
        delay.connect(analyser);

        // Big Knob Filter
        filter1 = audioCtx.createBiquadFilter();
        filter2 = audioCtx.createBiquadFilter();
        filter1.type = filter2.type = 'highpass';
        filter1.Q.value = 1.2;
        filter1.connect(filter2);
        filter2.connect(analyser);

        // Siren Routing
        osc = audioCtx.createOscillator();
        lfo = audioCtx.createOscillator();
        lfoG = audioCtx.createGain();
        sirenG = audioCtx.createGain();
        osc.type = 'square';
        sirenG.gain.value = 0;
        lfo.connect(lfoG);
        lfoG.connect(osc.frequency);
        osc.connect(sirenG);
        sirenG.connect(analyser);
        osc.start(); lfo.start();

        // Mixer Channels
        channels.forEach((ch, i) => {
            const el = document.getElementById(ch.id);
            const src = audioCtx.createMediaElementSource(el);
            ch.gain = audioCtx.createGain();
            ch.echoG = audioCtx.createGain();
            ch.fltrG = audioCtx.createGain();
            ch.echoG.gain.value = 0;
            ch.fltrG.gain.value = 0;

            src.connect(ch.gain);
            ch.gain.connect(analyser); // Dry
            ch.gain.connect(ch.echoG);
            ch.echoG.connect(delay); // To Echo
            ch.gain.connect(ch.fltrG);
            ch.fltrG.connect(filter1); // To Filter
        });

        analyser.connect(audioCtx.destination);
        startVU();
    }

    // Siren Logic
    const fireBtn = document.getElementById('fireBtn');
    const startS = (e) => { if(e) e.preventDefault(); setupAudio(); sirenG.gain.setTargetAtTime(0.5, audioCtx.currentTime, 0.02); };
    const stopS = () => { if(sirenG) sirenG.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); };
    fireBtn.onmousedown = fireBtn.ontouchstart = startS;
    window.onmouseup = window.ontouchend = stopS;

    // Siren Knob updates
    document.getElementById('pKnob').oninput = (e) => osc.frequency.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.05);
    document.getElementById('rKnob').oninput = (e) => lfo.frequency.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.05);
    document.getElementById('dKnob').oninput = (e) => lfoG.gain.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.05);
    document.getElementById('eKnob').oninput = (e) => feedback.gain.value = e.target.value;

    // Mixer Logic
    function updateVol(i, v) { if(channels[i].gain) channels[i].gain.gain.value = v; }
    
    function toggleS(i, type, btn) {
        setupAudio();
        if(type === 'e') {
            channels[i].eOn = !channels[i].eOn;
            channels[i].echoG.gain.value = channels[i].eOn ? 0.7 : 0;
            btn.classList.toggle('active-e');
        } else {
            channels[i].fOn = !channels[i].fOn;
            channels[i].fltrG.gain.value = channels[i].fOn ? 1 : 0;
            btn.classList.toggle('active-f');
        }
    }

    function rotateBigKnob() {
        setupAudio();
        currentFreqIdx = (currentFreqIdx + 1) % freqs.length;
        const f = freqs[currentFreqIdx];
        document.getElementById('dialHand').style.transform = `rotate(${currentFreqIdx * 30}deg)`;
        document.getElementById('freqLabel').innerText = f === 0 ? "OFF" : f + "Hz";
        filter1.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.05);
        filter2.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.05);
    }

    function masterToggle() {
        setupAudio();
        const btn = document.getElementById('mPlay');
        if(!isPlaying) {
            channels.forEach(ch => document.getElementById(ch.id).play());
            btn.innerText = "STOP ALL"; btn.style.background = "#800";
            isPlaying = true;
        } else {
            channels.forEach(ch => document.getElementById(ch.id).pause());
            btn.innerText = "START ALL TRACKS"; btn.style.background = "#060";
            isPlaying = false;
        }
    }

    function startVU() {
        const v = document.getElementById('vu');
        const leds = [];
        for(let i=0; i<24; i++) {
            const l = document.createElement('div');
            l.className = 'led';
            v.appendChild(l); leds.push(l);
        }
        function draw() {
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            const vol = data.reduce((a,b) => a+b) / data.length;
            const lit = Math.floor((vol / 140) * 24);
            leds.forEach((l, i) => {
                l.className = 'led';
                if(i < lit) {
                    if(i < 14) l.classList.add('on-g');
                    else if(i < 20) l.classList.add('on-y');
                    else l.classList.add('on-r');
                }
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
