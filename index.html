<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>General desEchos v6.1</title>
    <style>
        body { 
            background: #004488; color: #fff; font-family: "Courier New", monospace; 
            margin: 0; padding: 10px 0 140px 0; overflow-y: auto; touch-action: pan-y;
        }
        header { border: 4px double #fff; background: #222; padding: 10px; text-align: center; margin: 0 15px 15px; box-shadow: 4px 4px 0px #000; }
        .stack { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 95%; margin: 0 auto; }
        .unit { background: #444; border: 5px outset #888; width: 100%; max-width: 550px; padding: 15px; position: relative; box-sizing: border-box; }
        .unit-label { background: #111; color: #fc0; text-align: center; font-size: 10px; padding: 4px; border: 1px solid #444; margin-bottom: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}
        .bolt { position: absolute; width: 8px; height: 8px; background: #666; border-radius: 50%; border: 1px solid #333; }
        .tl { top: 8px; left: 8px; } .tr { top: 8px; right: 8px; } .bl { bottom: 8px; left: 8px; } .br { bottom: 8px; right: 8px; }

        /* DPAD */
        .dpad-area { width: 100px; height: 100px; background: #222; margin: 10px auto; border-radius: 50%; position: relative; border: 4px inset #000; touch-action: none; }
        .cross-v { position: absolute; left: 38px; top: 10px; width: 24px; height: 80px; background: #111; pointer-events: none;}
        .cross-h { position: absolute; left: 10px; top: 38px; width: 80px; height: 24px; background: #111; pointer-events: none;}
        #dot { position: absolute; width: 8px; height: 8px; background: red; border-radius: 50%; display: none; z-index: 10; pointer-events: none;}

        /* SIREN STYLING */
        .seg1 { background: #b08d57; color: #000; }
        .fire-button { width: 50px; height: 50px; background: radial-gradient(circle, #f00, #800); border: 4px outset #f66; border-radius: 50%; cursor: pointer; margin: 5px auto; display: block; touch-action: none; }
        .knob-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 8px; font-weight: bold; text-transform: uppercase; }
        
        /* BUS TOGGLES */
        .bus-row { display: flex; justify-content: center; gap: 5px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.2); }
        .s-btn { font-size: 9px; font-weight: bold; padding: 4px 8px; background: #222; color: #fff; border: 2px outset #666; cursor: pointer; }
        .active-e { background: #0f0 !important; color: #000; }
        .active-f { background: #fc0 !important; color: #000; }

        /* TAPE ECHO */
        .tape-deck-container { background: #1a1a1a; border: 4px inset #444; width: 200px; height: 80px; margin: 10px auto; position: relative; display: flex; align-items: center; justify-content: space-around; overflow: hidden; }
        .tape-reel { width: 60px; height: 60px; background: #c0c0c0; border-radius: 50%; position: relative; }
        .reel-spoke { position: absolute; top: 0; left: 28px; width: 4px; height: 60px; background: rgba(0,0,0,0.2); transform-origin: center center; }

        /* MIXER */
        .mixer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .chan { background: #333; border: 2px inset #222; padding: 8px; text-align: center; }
        .fader { appearance: slider-vertical; width: 16px; height: 60px; }
        
        .filter-dial { width: 50px; height: 50px; background: #222; border-radius: 50%; border: 3px solid #666; margin: 5px auto; position: relative; cursor: pointer; }
        .hand { width: 3px; height: 18px; background: red; position: absolute; top: 7px; left: 23.5px; transform-origin: bottom; }

        footer { position: fixed; bottom: 0; width: 100%; background: #c0c0c0; border-top: 2px solid #fff; height: 80px; padding: 10px; box-sizing: border-box; z-index: 1000; }
        #vu { height: 20px; background: #000; display: flex; gap: 2px; border: 2px inset #808080; }

        .blog-log { background: #fdf5e6; border: 1px solid #d2b48c; padding: 15px 15px 15px 35px; color: #332211; position: relative; width: 100%; box-sizing: border-box; font-size: 0.75rem;}
        .blog-log::before { content: ""; position: absolute; top: 0; left: 20px; width: 2px; height: 100%; background: rgba(255, 0, 0, 0.2); }
    </style>
</head>
<body>

<header><h1>General desEchos v6.1</h1></header>

<div class="stack">
    <div class="unit" style="background: #a0a0a0; text-align: center;">
        <button id="masterBtn" style="width:120px; height:40px; cursor:pointer;" onclick="bootSystem()"><b>SYSTEM BOOT</b></button>
    </div>

    <div class="unit" style="background: #555;">
        <div class="bolt tl"></div><div class="bolt tr"></div>
        <div class="unit-label">RICOH RP2A03 // COIN PAD</div>
        <div class="dpad-area" id="dpad"><div class="cross-v"></div><div class="cross-h"></div><div id="dot"></div></div>
        <div class="knob-grid">
            <div>PITCH <input type="range" id="nPit" min="400" max="1200" value="987"></div>
            <div>DECAY <input type="range" id="nDec" min="0.05" max="0.8" step="0.05" value="0.2"></div>
        </div>
        <div class="bus-row">
            <button class="s-btn" id="e-nes" onclick="togSirenBus('nes','e')">ECHO</button>
            <button class="s-btn" id="f-nes" onclick="togSirenBus('nes','f')">FILTER</button>
        </div>
    </div>

    <div class="unit seg1">
        <div class="bolt tl"></div><div class="bolt tr"></div>
        <div class="unit-label">SE-G1 // DUB SIREN</div>
        <div id="sFire" class="fire-button"></div>
        <div class="knob-grid">
            <div>PITCH <input type="range" id="sPit" min="100" max="1500" value="440"></div>
            <div>SPEED <input type="range" id="sRat" min="1" max="50" value="12"></div>
        </div>
        <div class="bus-row">
            <button class="s-btn" id="e-seg" onclick="togSirenBus('seg','e')">ECHO</button>
            <button class="s-btn" id="f-seg" onclick="togSirenBus('seg','f')">FILTER</button>
        </div>
    </div>

    <div class="unit" style="background: #a87d54; color: #000;">
        <div class="unit-label" style="background:#422; color:#fff;">IRON-OXIDE TAPE</div>
        <div class="tape-deck-container">
            <div class="tape-reel" id="leftReel"><div class="reel-spoke"></div><div class="reel-spoke" style="transform:rotate(90deg)"></div></div>
            <div class="tape-reel" id="rightReel"><div class="reel-spoke"></div><div class="reel-spoke" style="transform:rotate(90deg)"></div></div>
        </div>
        <div class="knob-grid">
            <div>REGEN <input type="range" id="eFbk" min="0" max="0.95" step="0.01" value="0.6"></div>
            <div>IPS <input type="range" id="eTim" min="0.05" max="1.0" step="0.01" value="0.4"></div>
        </div>
    </div>

    <div class="unit">
        <div class="unit-label">4-CH MIXER</div>
        <div class="mixer-grid" id="mGrid"></div>
        <div style="background:#111; padding:10px; margin-top:10px; text-align:center;">
            <div class="filter-dial" onclick="rotFilter()"><div id="fHand" class="hand"></div></div>
            <div id="fLabel" style="color:#fc0; font-size:10px;">HPF: OFF</div>
        </div>
    </div>

    <section class="unit blog-log">
        <strong>LOG #430: BUS RE-ROUTING</strong><br>
        - Added Echo/Filter toggles to Siren and Pad.<br>
        - Re-balanced input gains for bus sends.<br>
        - Finalized Tape Echo feedback loop.
    </section>
</div>

<footer><div id="vu"></div></footer>

<script>
    let ctx, analyser, sirenO, sirenL, sirenLG, sirenG, delay, feed, hpf1, hpf2, channels = [], isBooted = false, fIdx = 0, fFreqs = [0, 300, 800, 1500, 3000, 6000], reelRot = 0, nesO, nesG;
    let nesE, nesF, segE, segF; // Siren Bus Gains

    function bootSystem() {
        if (isBooted) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = ctx.createAnalyser(); 
        
        delay = ctx.createDelay(2.0); feed = ctx.createGain(); feed.gain.value = 0.6;
        delay.connect(feed); feed.connect(delay); delay.connect(analyser);

        hpf1 = ctx.createBiquadFilter(); hpf2 = ctx.createBiquadFilter();
        hpf1.type = hpf2.type = 'highpass'; hpf1.frequency.value = 0;
        hpf1.connect(hpf2); hpf2.connect(analyser);

        // Global Siren Bus Gains
        nesE = ctx.createGain(); nesF = ctx.createGain(); segE = ctx.createGain(); segF = ctx.createGain();
        [nesE, nesF, segE, segF].forEach(g => { g.gain.value = 0; g.connect(g === nesE || g === segE ? delay : hpf1); });

        // SE-G1 Setup
        sirenO = ctx.createOscillator(); sirenL = ctx.createOscillator(); sirenLG = ctx.createGain(); sirenG = ctx.createGain();
        sirenO.type = 'square'; sirenG.gain.value = 0;
        sirenL.connect(sirenLG); sirenLG.connect(sirenO.frequency);
        sirenO.connect(sirenG); sirenG.connect(analyser); 
        sirenG.connect(segE); sirenG.connect(segF);
        sirenO.start(); sirenL.start();

        const g = document.getElementById('mGrid'); g.innerHTML = '';
        for(let i=0; i<4; i++) {
            const d = document.createElement('div'); d.className='chan';
            d.innerHTML = `<label style="font-size:7px;">CH-${i+1}<input type="file" style="display:none" onchange="loadF(${i},this)"></label>
                <div><button class="s-btn" id="e-${i}" onclick="togFX(${i},'e')">E</button><button class="s-btn" id="f-${i}" onclick="togFX(${i},'f')">F</button></div>
                <input type="range" class="fader" oninput="setV(${i},this.value)" min="0" max="1" step="0.01" value="0.7">
                <audio id="a${i}" loop></audio>`;
            g.appendChild(d);
            const node = ctx.createMediaElementSource(document.getElementById(`a${i}`));
            const gn = ctx.createGain(); const eGn = ctx.createGain(); const fGn = ctx.createGain();
            eGn.gain.value = fGn.gain.value = 0;
            node.connect(gn); gn.connect(analyser); node.connect(eGn); eGn.connect(delay); node.connect(fGn); fGn.connect(hpf1);
            channels.push({gn, eGn, fGn, aud: document.getElementById(`a${i}`), vol:0.7});
        }
        analyser.connect(ctx.destination);
        isBooted = true; startVU(); animateReels();
    }

    function togSirenBus(type, bus) {
        if(!isBooted) return;
        let target = (type === 'nes' ? (bus === 'e' ? nesE : nesF) : (bus === 'e' ? segE : segF));
        target.gain.value = target.gain.value ? 0 : 1;
        document.getElementById(`${bus}-${type}`).classList.toggle(`active-${bus}`);
    }

    const dp = document.getElementById('dpad');
    let dAct = false;
    dp.onmousedown = dp.ontouchstart = (e) => { if(!isBooted) return; e.preventDefault(); dAct = true; trigN(); moveN(e.touches?.[0] || e); };
    const stopN = () => { if(!dAct) return; dAct = false; nesG.gain.setTargetAtTime(0, ctx.currentTime, 0.05); nesO.stop(ctx.currentTime+0.2); };
    window.onmousemove = (e) => dAct && moveN(e);
    window.ontouchmove = (e) => { if(dAct) { e.preventDefault(); moveN(e.touches[0]); } };
    window.onmouseup = window.ontouchend = stopN;

    function trigN() {
        nesO = ctx.createOscillator(); nesG = ctx.createGain(); nesO.type = 'square';
        nesO.connect(nesG); nesG.connect(analyser); 
        nesG.connect(nesE); nesG.connect(nesF);
        nesG.gain.setValueAtTime(0.3, ctx.currentTime); nesO.start();
    }
    function moveN(e) {
        const r = dp.getBoundingClientRect(); const y = (e.clientY - r.top) / r.height;
        if(nesO) nesO.frequency.setTargetAtTime(parseFloat(document.getElementById('nPit').value) * (2-y), ctx.currentTime, 0.05);
    }

    const sf = document.getElementById('sFire');
    sf.onmousedown = sf.ontouchstart = (e) => { e.preventDefault(); if(sirenG) sirenG.gain.setTargetAtTime(0.5, ctx.currentTime, 0.02); };
    const relS = () => { if(sirenG) sirenG.gain.setTargetAtTime(0, ctx.currentTime, 0.5); };
    window.addEventListener('mouseup', relS); window.addEventListener('touchend', relS);

    function animateReels() { if(!isBooted) return; reelRot += (1.1 - parseFloat(document.getElementById('eTim').value)) * 8; document.getElementById('leftReel').style.transform = `rotate(${reelRot}deg)`; document.getElementById('rightReel').style.transform = `rotate(${reelRot}deg)`; requestAnimationFrame(animateReels); }
    function togFX(i, t) {
        const c = channels[i];
        if(t==='e') c.eGn.gain.value = c.eGn.gain.value ? 0 : 1;
        if(t==='f') c.fGn.gain.value = c.fGn.gain.value ? 0 : 1;
        document.getElementById(`${t}-${i}`).classList.toggle(`active-${t}`);
    }
    function rotFilter() { fIdx = (fIdx+1)%fFreqs.length; hpf1.frequency.value = hpf2.frequency.value = fFreqs[fIdx]; document.getElementById('fHand').style.transform=`rotate(${fIdx*45}deg)`; document.getElementById('fLabel').innerText = fFreqs[fIdx]===0?"HPF: OFF":"HPF: "+fFreqs[fIdx]+"Hz"; }
    function setV(i,v) { channels[i].gn.gain.value = v; }
    function loadF(i,inp) { if(inp.files[0]) { channels[i].aud.src = URL.createObjectURL(inp.files[0]); channels[i].aud.play(); } }
    function startVU() { const v = document.getElementById('vu'); setInterval(() => { const data = new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(data); const avg = data.reduce((a,b)=>a+b)/data.length; v.innerHTML = ''; for(let i=0; i<20; i++) { const l = document.createElement('div'); l.style.flex = "1"; l.style.background = (i < avg/4) ? (i<14?"#0f0":"#f00") : "#111"; v.appendChild(l); } }, 50); }
</script>
</body>
</html>
