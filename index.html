<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>General desEchos v3.7 - Dub Stack</title>
    <style>
        /* --- SYSTEM CORE --- */
        body {
            background-color: #004488;
            background-image: linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: "Courier New", monospace;
            margin: 0;
            padding: 10px 0 120px 0;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        header {
            border: 4px double #ffffff; background: #222; padding: 10px;
            text-align: center; box-shadow: 4px 4px 0px #000; margin: 0 15px 15px 15px;
        }

        h1 { color: #ffffff; margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }

        /* --- STACK LAYOUT --- */
        .stack-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px; /* Tight stacking like a rack */
            max-width: 95%;
            margin: 0 auto;
        }

        .rack-unit {
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .bolt { position: absolute; width: 8px; height: 8px; background: #666; border-radius: 50%; border: 1px solid #333; z-index: 5; }
        .tl { top: 8px; left: 8px; } .tr { top: 8px; right: 8px; } .bl { bottom: 8px; left: 8px; } .br { bottom: 8px; right: 8px; }

        .unit-label { background: #111; color: #ffcc00; padding: 4px; text-align: center; font-weight: bold; border: 1px solid #444; margin-bottom: 15px; font-size: 10px; letter-spacing: 1px; }

        /* --- SIREN UNIT (GOLD/BROWN) --- */
        .seg1-unit { background: #b08d57; border: 5px outset #d4af37; color: #222; padding: 20px; }
        .fire-button {
            width: 60px; height: 60px; background: radial-gradient(circle, #ff0000, #880000);
            border: 4px outset #ff6666; border-radius: 50%; cursor: pointer; margin: 0 auto;
            box-shadow: 0 4px 0 #440000; touch-action: none;
        }

        /* --- SPACE DELAY UNIT (SILVER) --- */
        .delay-unit { background: #c0c0c0; border: 5px outset #eee; color: #333; padding: 20px; }
        
        /* LONG TOGGLE SWITCH */
        .toggle-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; }
        .switch {
            position: relative; display: inline-block; width: 80px; height: 34px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444; transition: .4s; border: 2px solid #222;
        }
        .slider:before {
            position: absolute; content: ""; height: 40px; width: 14px; left: 31px; bottom: -5px;
            background-color: #888; border: 2px solid #222; transition: .4s; box-shadow: 0 4px 4px rgba(0,0,0,0.4);
        }
        input:checked + .slider { background-color: #00ff00; }
        input:checked + .slider:before { transform: translateY(-5px) rotate(10deg); background-color: #aaa; }
        .switch-text { font-size: 10px; font-weight: bold; color: #000; }

        /* --- MIXER UNIT (BLACK/DARK GREY) --- */
        .mixer-container { background: #333; border: 5px outset #555; padding: 15px; color: #fff; max-width: 600px; }
        .mixer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .channel-strip { background: #444; border: 2px inset #222; padding: 8px; text-align: center; }
        .chan-led { width: 10px; height: 10px; background: #111; border-radius: 50%; margin: 0 auto 5px auto; }
        .chan-led.active { background: #0f0; box-shadow: 0 0 8px #0f0; }
        .vert-fader { appearance: slider-vertical; width: 18px; height: 80px; margin: 10px 0; }
        .upload-area { font-size: 8px; background: #000; color: #0f0; padding: 4px; border: 1px solid #333; height: 24px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer;}

        /* --- KNOBS & INPUTS --- */
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .knob-label { font-size: 9px; font-weight: bold; text-align: center; display: block; margin-bottom: 2px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #800; }

        /* --- FOOTER --- */
        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #222; border-top: 3px solid #ffcc00; padding: 10px; box-sizing: border-box; z-index: 10000; height: 90px; }
        .vu-meter { display: flex; gap: 2px; height: 15px; background: #000; padding: 3px; border: 2px inset #444; }
        .led { flex: 1; background: #111; }
        .led.on-g { background: #0f0; } .led.on-y { background: #ff0; } .led.on-r { background: #f00; }

        @media (min-width: 600px) { .mixer-grid { grid-template-columns: repeat(4, 1fr); } .rack-unit { max-width: 550px; } }
    </style>
</head>
<body>

<header><h1>General desEchos v3.7</h1></header>

<div class="stack-container">
    
    <section class="rack-unit seg1-unit">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label">SIREN GENERATOR // SE-G1</div>
        <div class="control-grid">
            <div><span class="knob-label">PITCH</span><input type="range" id="pitchKnob" min="100" max="1500" value="440"></div>
            <div><span class="knob-label">LFO RATE</span><input type="range" id="rateKnob" min="1" max="40" value="12"></div>
            <div><span class="knob-label">DEPTH</span><input type="range" id="depthKnob" min="0" max="1500" value="600"></div>
            <div><span class="knob-label">SIREN VOL</span><input type="range" id="volKnob" min="0" max="1" step="0.05" value="0.5"></div>
        </div>
        <div style="text-align:center; margin-top:15px;">
            <div id="fireBtn" class="fire-button"></div>
            <button id="modeToggle" style="margin-top:10px; font-size:9px; padding:5px; background:#333; color:#fff; cursor:pointer;">LFO: SQUARE</button>
        </div>
    </section>

    <section class="rack-unit delay-unit">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label">DIGITAL SPACE DELAY // E-X2</div>
        <div class="control-grid">
            <div><span class="knob-label">FEEDBACK</span><input type="range" id="echoKnob" min="0" max="0.95" step="0.05" value="0.5"></div>
            <div><span class="knob-label">TIME</span><input type="range" id="timeKnob" min="0.05" max="2.0" step="0.05" value="0.4"></div>
        </div>
        <div class="toggle-container">
            <span class="switch-text">OFF</span>
            <label class="switch">
                <input type="checkbox" id="delayToggle">
                <span class="slider"></span>
            </label>
            <span class="switch-text">ON</span>
        </div>
    </section>

    <section class="rack-unit mixer-container">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label">4-CH DUB MIXER / SESSION RECORDER</div>
        <div class="mixer-grid" id="mixerUI"></div>
        <button id="masterBtn" style="width:100%; padding:12px; margin-top:15px; background:#040; color:#fff; border:3px outset #080; font-family:monospace; font-weight:bold; cursor:pointer;" onclick="toggleAll()">START MIXER ENGINE</button>
    </section>

</div>

<footer>
    <div style="color:#ffcc00; font-size:9px; font-weight:bold; margin-bottom:4px;">SIGNAL MONITOR</div>
    <div class="vu-meter" id="vu"></div>
</footer>

<script>
    let audioCtx, analyser, sirenOsc, sirenLfo, sirenLfoG, sirenG, delay, feedback;
    let isPlaying = false, isSirenEcho = false, lfoType = 'square';
    const channels = [];

    // Setup Mixer
    const mixerUI = document.getElementById('mixerUI');
    for(let i=0; i<4; i++) {
        const strip = document.createElement('div');
        strip.className = 'channel-strip';
        strip.innerHTML = `
            <div id="led-${i}" class="chan-led"></div>
            <label class="upload-area" id="up-box-${i}">UPLOAD<input type="file" style="display:none" onchange="loadUserFile(${i}, this)"></label>
            <input type="range" class="vert-fader" min="0" max="1" step="0.01" value="0.7" oninput="setVol(${i}, this.value)">
            <audio id="mix-aud-${i}" loop src="audio${i+1}.mp3" crossorigin="anonymous"></audio>
        `;
        mixerUI.appendChild(strip);
        channels.push({ gain:null, echoG:null, connected:false });
    }

    function initAudio() {
        if (audioCtx && audioCtx.state !== 'suspended') return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();

        delay = audioCtx.createDelay(2.0);
        delay.delayTime.value = 0.4;
        feedback = audioCtx.createGain();
        feedback.gain.value = 0.5;
        delay.connect(feedback); feedback.connect(delay); delay.connect(analyser);

        sirenOsc = audioCtx.createOscillator(); sirenLfo = audioCtx.createOscillator();
        sirenLfoG = audioCtx.createGain(); sirenG = audioCtx.createGain(); 
        sirenOsc.type = 'square'; sirenLfo.type = lfoType; sirenG.gain.value = 0;
        sirenLfo.connect(sirenLfoG); sirenLfoG.connect(sirenOsc.frequency);
        sirenOsc.connect(sirenG); sirenG.connect(analyser);
        sirenOsc.start(); sirenLfo.start();

        channels.forEach((ch, i) => {
            if (!ch.connected) {
                const audEl = document.getElementById(`mix-aud-${i}`);
                const node = audioCtx.createMediaElementSource(audEl);
                ch.gain = audioCtx.createGain();
                ch.echoG = audioCtx.createGain();
                ch.echoG.gain.value = 0.8; // Constant echo send for mixer
                node.connect(ch.gain); ch.gain.connect(analyser); 
                ch.gain.connect(ch.echoG); ch.echoG.connect(delay);
                ch.connected = true;
                audEl.addEventListener('play', () => document.getElementById(`led-${i}`).classList.add('active'));
                audEl.addEventListener('pause', () => document.getElementById(`led-${i}`).classList.remove('active'));
            }
        });

        analyser.connect(audioCtx.destination);
        startVU();
    }

    function loadUserFile(i, input) {
        const file = input.files[0];
        const box = document.getElementById(`up-box-${i}`);
        if(file) {
            box.innerText = "...";
            setTimeout(() => {
                box.innerText = file.name.substring(0, 6) + "..";
                document.getElementById(`mix-aud-${i}`).src = URL.createObjectURL(file);
            }, 500);
        }
    }

    function setVol(i, v) { if(channels[i].gain) channels[i].gain.gain.value = v; }

    function toggleAll() {
        initAudio(); audioCtx.resume();
        isPlaying = !isPlaying;
        document.getElementById('masterBtn').innerText = isPlaying ? "STOP ENGINE" : "START ENGINE";
        channels.forEach((ch, i) => {
            const aud = document.getElementById(`mix-aud-${i}`);
            isPlaying ? aud.play() : aud.pause();
        });
    }

    // SIREN FIRE
    const onFire = (e) => { 
        if(e) e.preventDefault(); initAudio(); 
        audioCtx.resume().then(() => {
            sirenG.gain.setTargetAtTime(document.getElementById('volKnob').value, audioCtx.currentTime, 0.02);
        });
    };
    const offFire = () => { if(sirenG) sirenG.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); };
    const fireBtn = document.getElementById('fireBtn');
    fireBtn.onmousedown = fireBtn.ontouchstart = onFire;
    window.onmouseup = window.ontouchend = offFire;

    // DELAY TOGGLE
    document.getElementById('delayToggle').onchange = (e) => {
        initAudio(); audioCtx.resume();
        isSirenEcho = e.target.checked;
        if(isSirenEcho) sirenG.connect(delay); else sirenG.disconnect(delay);
    };

    // KNOBS
    document.getElementById('pitchKnob').oninput = (e) => { if(sirenOsc) sirenOsc.frequency.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.05); };
    document.getElementById('rateKnob').oninput = (e) => { if(sirenLfo) sirenLfo.frequency.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.05); };
    document.getElementById('depthKnob').oninput = (e) => { if(sirenLfoG) sirenLfoG.gain.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.05); };
    document.getElementById('echoKnob').oninput = (e) => { if(feedback) feedback.gain.value = e.target.value; };
    document.getElementById('timeKnob').oninput = (e) => { if(delay) delay.delayTime.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.1); };

    function startVU() {
        const vu = document.getElementById('vu'); vu.innerHTML = '';
        const leds = [];
        for(let i=0; i<20; i++) {
            const l = document.createElement('div'); l.className = 'led'; vu.appendChild(l); leds.push(l);
        }
        function draw() {
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            const vol = data.reduce((a,b) => a+b) / data.length;
            const lit = Math.floor((vol / 120) * 20);
            leds.forEach((l, i) => {
                l.className = 'led';
                if(i < lit) {
                    if(i < 12) l.classList.add('on-g');
                    else if(i < 17) l.classList.add('on-y');
                    else l.classList.add('on-r');
                }
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
