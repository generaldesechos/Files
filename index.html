<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>General desEchos v5.9 - Full Restoration</title>
    <style>
        body { 
            background: #004488; color: #fff; font-family: "Courier New", monospace; 
            margin: 0; padding: 10px 0 140px 0; overflow-y: auto; touch-action: pan-y;
        }
        header { border: 4px double #fff; background: #222; padding: 10px; text-align: center; margin: 0 15px 15px; box-shadow: 4px 4px 0px #000; }
        .stack { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 95%; margin: 0 auto; }
        .unit { background: #444; border: 5px outset #888; width: 100%; max-width: 550px; padding: 15px; position: relative; box-sizing: border-box; }
        .unit-label { background: #111; color: #fc0; text-align: center; font-size: 10px; padding: 4px; border: 1px solid #444; margin-bottom: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}
        .bolt { position: absolute; width: 8px; height: 8px; background: #666; border-radius: 50%; border: 1px solid #333; }
        .tl { top: 8px; left: 8px; } .tr { top: 8px; right: 8px; } .bl { bottom: 8px; left: 8px; } .br { bottom: 8px; right: 8px; }

        /* TRANSPORT DECK */
        .transport-unit { background: #a0a0a0; border: 4px solid #333; padding: 20px; text-align: center; box-shadow: 4px 4px 0px #000; }
        .play-btn { 
            width: 140px; height: 60px; background: linear-gradient(180deg, #d0d0d0 0%, #a0a0a0 100%);
            border: 3px solid #666; border-radius: 4px; cursor: pointer; position: relative;
            display: inline-flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 4px 0 #555; transition: 0.1s;
        }
        .play-btn.engaged { background: #b0b0b0; transform: translateY(2px); box-shadow: 0 2px 0 #444; }
        .play-tri { width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 18px solid #333; }
        .led { width: 8px; height: 8px; background: #242; border-radius: 50%; border: 1px solid #000; display: inline-block; }
        .led.active { background: #0f0; box-shadow: 0 0 10px #0f0; }

        /* SIREN SE-G1 */
        .seg1 { background: #b08d57; color: #000; }
        .fire-button { width: 55px; height: 55px; background: radial-gradient(circle, #f00, #800); border: 4px outset #f66; border-radius: 50%; cursor: pointer; margin: 10px auto; display: block; touch-action: none; }
        .knob-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 8px; font-weight: bold; text-transform: uppercase; }

        /* IRON OXIDE TAPE DELAY */
        .tape-deck-container { background: #1a1a1a; border: 4px inset #444; width: 220px; height: 100px; margin: 10px auto; position: relative; display: flex; align-items: center; justify-content: space-around; overflow: hidden; }
        .tape-reel { width: 80px; height: 80px; background: #c0c0c0; border-radius: 50%; position: relative; z-index: 2; box-shadow: inset 0 0 15px #000; }
        .reel-hub { position: absolute; top: 30px; left: 30px; width: 20px; height: 20px; background: #222; border-radius: 50%; }
        .reel-spoke { position: absolute; top: 0; left: 38px; width: 4px; height: 80px; background: rgba(0,0,0,0.2); transform-origin: center center; }

        /* MIXER */
        .mixer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .chan { background: #333; border: 2px inset #222; padding: 8px; text-align: center; }
        .upload-area { font-size: 7px; background: #000; color: #0f0; padding: 5px; border: 1px solid #333; display: block; margin-bottom: 5px; cursor: pointer; height: 18px; line-height: 18px; text-align: center; overflow: hidden; }
        .fader { appearance: slider-vertical; width: 16px; height: 70px; }
        .s-btn { font-size: 8px; padding: 3px; background: #222; color: #fff; border: 2px outset #666; cursor: pointer; width: 32px; margin: 1px; }
        .active-e { background: #0f0 !important; color: #000; }
        .active-f { background: #fc0 !important; color: #000; }
        .active-m { background: #f00 !important; }
        .active-s { background: #0080ff !important; }
        
        /* HPF DIAL */
        .filter-dial { width: 60px; height: 60px; background: #222; border-radius: 50%; border: 3px solid #666; margin: 5px auto; position: relative; cursor: pointer; }
        .hand { width: 3px; height: 20px; background: red; position: absolute; top: 10px; left: 28.5px; transform-origin: bottom; }

        /* FOOTER */
        footer { position: fixed; bottom: 0; width: 100%; background: #c0c0c0; border-top: 2px solid #fff; height: 100px; padding: 10px; box-sizing: border-box; z-index: 1000; display: flex; flex-direction: column; gap: 5px; }
        #vu { height: 25px; background: #000; display: flex; gap: 2px; border: 2px inset #808080; flex-grow: 1; }
        .win95-switch { appearance: none; width: 34px; height: 18px; background: #400; border: 2px solid #808080; cursor: pointer; position: relative; vertical-align: middle; }
        .win95-switch:checked { background: #f00; }
        .win95-switch::after { content: ''; position: absolute; top: 1px; left: 1px; width: 10px; height: 10px; background: #c0c0c0; border: 2px outset #fff; transition: 0.1s; }
        .win95-switch:checked::after { left: 18px; }

        @media (min-width: 600px) { .mixer-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

<header><h1>General desEchos v5.9</h1></header>

<div class="stack">
    <div class="unit transport-unit">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label" style="background:#333; color:#eee;">TRANSPORT CONTROL // MASTER IGNITION</div>
        <button id="masterBtn" class="play-btn" onclick="bootSystem()">
            <div class="play-tri"></div>
            <span style="color:#222; font-weight:900;">PLAY</span>
        </button>
        <div style="margin-top:10px;"><div id="playLed" class="led"></div> <span style="font-size:8px; color:#222; font-weight:bold;">SYSTEM READY</span></div>
    </div>

    <div class="unit seg1">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label" style="color:#000; border-color:#000;">GENERAL DESECHOS SE-G1 // DUB SIREN</div>
        <div class="knob-grid">
            <div>OSC PITCH <input type="range" id="sPit" min="100" max="1500" value="440"></div>
            <div>LFO RATE <input type="range" id="sRat" min="1" max="50" value="12"></div>
            <div>LFO DEPTH <input type="range" id="sDep" min="0" max="1000" value="300"></div>
            <div>AMP DECAY <input type="range" id="sDec" min="0.1" max="2.0" step="0.1" value="0.5"></div>
        </div>
        <div id="sFire" class="fire-button"></div>
    </div>

    <div class="unit" style="background: #a87d54; color: #000;">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label" style="background:#422; color:#fff;">IRON-OXIDE // TAPE ECHO SIMULATOR</div>
        <div class="tape-deck-container">
            <div class="tape-reel" id="leftReel"><div class="reel-hub"></div><div class="reel-spoke"></div><div class="reel-spoke" style="transform:rotate(90deg)"></div></div>
            <div class="tape-reel" id="rightReel"><div class="reel-hub"></div><div class="reel-spoke"></div><div class="reel-spoke" style="transform:rotate(90deg)"></div></div>
        </div>
        <div class="knob-grid" style="color:#221100">
            <div>REGEN <input type="range" id="eFbk" min="0" max="0.95" step="0.01" value="0.6"></div>
            <div>IPS (SPEED) <input type="range" id="eTim" min="0.05" max="1.0" step="0.01" value="0.4"></div>
            <div>FLUTTER <input type="range" id="eFlut" min="0" max="10" step="0.1" value="3"></div>
            <div>HISS <input type="range" id="eHiss" min="0" max="0.05" step="0.001" value="0.01"></div>
        </div>
    </div>

    <div class="unit">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label">4-CH DUB MIXER // FX BUS ROUTING</div>
        <div class="mixer-grid" id="mGrid"></div>
        <div style="background:#111; padding:10px; margin-top:15px; text-align:center; border: 4px inset #444;">
            <div class="filter-dial" onclick="rotFilter()"><div id="fHand" class="hand"></div></div>
            <div id="fLabel" style="color:#fc0; font-size:10px; font-weight:bold;">HPF: OFF</div>
        </div>
    </div>
</div>

<footer>
    <div id="vu"></div>
    <div style="text-align:center;">
        <span style="font-size:8px; font-weight:bold; color:#000; display:block;">VU PWR</span>
        <input type="checkbox" id="vuTog" class="win95-switch" checked>
    </div>
</footer>

<script>
    let ctx, analyser, sirenO, sirenL, sirenLG, sirenG, delay, feed, hpf1, hpf2, channels = [];
    let flutterLFO, flutterGain, hissNode, shaper, isBooted = false, fIdx = 0, fFreqs = [0, 300, 800, 1500, 3000, 6000], reelRot = 0;

    function makeDistortionCurve(amount) {
        let n = 44100, curve = new Float32Array(n), deg = Math.PI / 180;
        for (let i = 0; i < n; ++i ) {
            let x = i * 2 / n - 1;
            curve[i] = (3 + amount) * x * 20 * deg / (Math.PI + amount * Math.abs(x));
        }
        return curve;
    }

    function bootSystem() {
        if (isBooted) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = ctx.createAnalyser(); 

        // TAPE ECHO CIRCUIT
        delay = ctx.createDelay(2.0); feed = ctx.createGain(); shaper = ctx.createWaveShaper();
        shaper.curve = makeDistortionCurve(40);
        
        flutterLFO = ctx.createOscillator(); flutterGain = ctx.createGain();
        flutterLFO.frequency.value = 2.5; flutterGain.gain.value = 0.003; 
        flutterLFO.connect(flutterGain); flutterGain.connect(delay.delayTime);
        flutterLFO.start();

        let bufferSize = 2 * ctx.sampleRate, noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate), output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
        let whiteNoise = ctx.createBufferSource(); whiteNoise.buffer = noiseBuffer; whiteNoise.loop = true;
        hissNode = ctx.createGain(); hissNode.gain.value = 0.01;
        whiteNoise.connect(hissNode); hissNode.connect(delay); whiteNoise.start();

        delay.connect(shaper); shaper.connect(feed); feed.connect(delay); shaper.connect(analyser);

        // FILTERS
        hpf1 = ctx.createBiquadFilter(); hpf2 = ctx.createBiquadFilter();
        hpf1.type = hpf2.type = 'highpass'; hpf1.frequency.value = hpf2.frequency.value = 0;
        hpf1.connect(hpf2); hpf2.connect(analyser);

        // SIREN
        sirenO = ctx.createOscillator(); sirenL = ctx.createOscillator();
        sirenLG = ctx.createGain(); sirenG = ctx.createGain();
        sirenO.type = 'square'; sirenG.gain.value = 0;
        sirenL.connect(sirenLG); sirenLG.connect(sirenO.frequency);
        sirenO.connect(sirenG); sirenG.connect(analyser);
        sirenO.start(); sirenL.start();

        const g = document.getElementById('mGrid'); g.innerHTML = '';
        for(let i=0; i<4; i++) {
            const d = document.createElement('div'); d.className='chan';
            d.innerHTML = `<label class="upload-area">CH-${i+1} LOAD<input type="file" style="display:none" onchange="loadF(${i},this)"></label>
                <div style="display:flex; justify-content:center; gap:1px;">
                    <button class="s-btn" id="e-${i}" onclick="togFX(${i},'e')">E</button>
                    <button class="s-btn" id="f-${i}" onclick="togFX(${i},'f')">F</button>
                </div>
                <div style="display:flex; justify-content:center; gap:1px;">
                    <button class="s-btn" id="m-${i}" onclick="togFX(${i},'m')">M</button>
                    <button class="s-btn" id="s-${i}" onclick="togFX(${i},'s')">S</button>
                </div>
                <input type="range" class="fader" oninput="setV(${i},this.value)" min="0" max="1" step="0.01" value="0.7">
                <audio id="a${i}" loop crossorigin="anonymous"></audio>`;
            g.appendChild(d);
            const node = ctx.createMediaElementSource(document.getElementById(`a${i}`));
            const gn = ctx.createGain(); const eGn = ctx.createGain(); const fGn = ctx.createGain();
            eGn.gain.value = fGn.gain.value = 0;
            node.connect(gn); gn.connect(analyser); node.connect(eGn); eGn.connect(delay); node.connect(fGn); fGn.connect(hpf1);
            channels.push({gn, eGn, fGn, aud: document.getElementById(`a${i}`), mOn:0, sOn:0, eOn:0, fOn:0, vol:0.7});
        }
        analyser.connect(ctx.destination);
        isBooted = true; 
        document.getElementById('masterBtn').classList.add('engaged');
        document.getElementById('playLed').classList.add('active');
        startVU(); animateReels();
    }

    function animateReels() {
        if (!isBooted) return;
        reelRot += (1.1 - parseFloat(document.getElementById('eTim').value)) * 8;
        document.getElementById('leftReel').style.transform = `rotate(${reelRot}deg)`;
        document.getElementById('rightReel').style.transform = `rotate(${reelRot}deg)`;
        requestAnimationFrame(animateReels);
    }

    document.getElementById('eFbk').oninput = (e) => feed.gain.value = e.target.value;
    document.getElementById('eTim').oninput = (e) => delay.delayTime.value = e.target.value;
    document.getElementById('eFlut').oninput = (e) => flutterGain.gain.value = e.target.value / 1000;
    document.getElementById('eHiss').oninput = (e) => hissNode.gain.value = e.target.value;

    const sf = document.getElementById('sFire');
    sf.onmousedown = sf.ontouchstart = (e) => { e.preventDefault(); if(sirenG) sirenG.gain.setTargetAtTime(0.5, ctx.currentTime, 0.02); };
    const relS = () => { if(sirenG) sirenG.gain.setTargetAtTime(0, ctx.currentTime, parseFloat(document.getElementById('sDec').value)); };
    window.addEventListener('mouseup', relS); window.addEventListener('touchend', relS);
    document.getElementById('sPit').oninput=(e)=>sirenO.frequency.value=e.target.value;
    document.getElementById('sRat').oninput=(e)=>sirenL.frequency.value=e.target.value;
    document.getElementById('sDep').oninput=(e)=>sirenLG.gain.value=e.target.value;

    function togFX(i, t) {
        const c = channels[i];
        if(t==='e') { c.eOn = !c.eOn; c.eGn.gain.value = c.eOn?1.0:0; }
        if(t==='f') { c.fOn = !c.fOn; c.fGn.gain.value = c.fOn?1.0:0; }
        if(t==='m') c.mOn = !c.mOn;
        if(t==='s') c.sOn = !c.sOn;
        document.getElementById(`${t}-${i}`).classList.toggle(`active-${t}`);
        updateMix();
    }
    function rotFilter() { fIdx = (fIdx+1)%fFreqs.length; hpf1.frequency.value = hpf2.frequency.value = fFreqs[fIdx]; document.getElementById('fHand').style.transform=`rotate(${fIdx*45}deg)`; document.getElementById('fLabel').innerText = fFreqs[fIdx]===0?"HPF: OFF":"HPF: "+fFreqs[fIdx]+"Hz"; }
    function updateMix() { const anyS = channels.some(c => c.sOn); channels.forEach(c => { c.gn.gain.value = c.mOn ? 0 : (anyS && !c.sOn ? 0 : c.vol); }); }
    function setV(i,v) { channels[i].vol = v; updateMix(); }
    function loadF(i,inp) { if(inp.files[0]) { channels[i].aud.src = URL.createObjectURL(inp.files[0]); channels[i].aud.play(); } }

    function startVU() {
        const v = document.getElementById('vu');
        setInterval(() => {
            if(!document.getElementById('vuTog').checked) { v.innerHTML = ''; return; }
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            const avg = data.reduce((a,b)=>a+b)/data.length;
            v.innerHTML = '';
            for(let i=0; i<20; i++) {
                const l = document.createElement('div'); l.style.flex = "1";
                l.style.background = (i < avg/4) ? (i<14?"#0f0":"#f00") : "#111";
                v.appendChild(l);
            }
        }, 50);
    }
</script>
</body>
</html>
