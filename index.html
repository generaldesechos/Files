<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>General desEchos v3.9 - Master Stack</title>
    <style>
        /* --- SYSTEM CORE --- */
        body {
            background-color: #004488;
            background-image: linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: "Courier New", monospace;
            margin: 0;
            padding: 10px 0 120px 0;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        header {
            border: 4px double #ffffff; background: #222; padding: 10px;
            text-align: center; box-shadow: 4px 4px 0px #000; margin: 0 15px 15px 15px;
        }

        h1 { color: #ffffff; margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }

        .stack-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            max-width: 95%;
            margin: 0 auto;
        }

        .rack-unit {
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

        .bolt { position: absolute; width: 8px; height: 8px; background: #666; border-radius: 50%; border: 1px solid #333; z-index: 5; }
        .tl { top: 8px; left: 8px; } .tr { top: 8px; right: 8px; } .bl { bottom: 8px; left: 8px; } .br { bottom: 8px; right: 8px; }

        .unit-label { background: #111; color: #ffcc00; padding: 4px; text-align: center; font-weight: bold; border: 1px solid #444; margin-bottom: 15px; font-size: 10px; letter-spacing: 1px; }

        /* --- SIREN UNIT --- */
        .seg1-unit { background: #b08d57; border: 5px outset #d4af37; color: #222; padding: 20px; }
        .fire-button {
            width: 60px; height: 60px; background: radial-gradient(circle, #ff0000, #880000);
            border: 4px outset #ff6666; border-radius: 50%; cursor: pointer; margin: 0 auto;
            box-shadow: 0 4px 0 #440000; touch-action: none; display: block;
        }

        /* --- MIXER UNIT --- */
        .mixer-container { background: #333; border: 5px outset #555; padding: 15px; color: #fff; }
        .mixer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .channel-strip { background: #444; border: 2px inset #222; padding: 8px; text-align: center; }
        .chan-led { width: 10px; height: 10px; background: #111; border-radius: 50%; margin: 0 auto 8px auto; }
        .chan-led.active { background: #0f0; box-shadow: 0 0 8px #0f0; }
        
        .s-btn { font-size: 8px; padding: 4px; margin: 2px; border: 2px outset #666; background: #222; color: #fff; cursor: pointer; width: 35px;}
        .s-btn.active-e { background: #00ff00; color: #000; }
        .s-btn.active-f { background: #ffcc00; color: #000; }

        .upload-area { font-size: 8px; background: #000; color: #0f0; padding: 4px; border: 1px solid #333; height: 22px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 5px;}

        /* --- KING TUBBY FILTER PANEL --- */
        .big-knob-panel { grid-column: span 2; background: #1a1a1a; padding: 10px; margin-top: 10px; text-align: center; border: 4px inset #444; }
        .rotary-dial { width: 60px; height: 60px; background: #333; border-radius: 50%; border: 3px solid #666; margin: 5px auto; position: relative; cursor: pointer; }
        .dial-hand { width: 3px; height: 22px; background: red; position: absolute; top: 8px; left: 28.5px; transform-origin: center 22px; }
        .freq-text { color: #ffcc00; font-size: 14px; font-weight: bold; }

        /* --- CONTROLS --- */
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .knob-label { font-size: 9px; font-weight: bold; text-align: center; display: block; margin-bottom: 2px; text-transform: uppercase; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #800; }
        .vert-fader { appearance: slider-vertical; width: 18px; height: 80px; margin: 5px 0; }

        /* --- WIN95 FOOTER --- */
        footer { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #c0c0c0; border-top: 2px solid #ffffff; 
            outline: 1px solid #808080; padding: 8px 15px; box-sizing: border-box; 
            z-index: 10000; height: 100px; box-shadow: inset 1px 1px 0px #fff;
        }
        .footer-flex { display: flex; align-items: center; gap: 15px; height: 100%; }
        .footer-main-area { flex-grow: 1; }
        .footer-label { color: #000; font-size: 10px; font-weight: bold; margin-bottom: 4px; font-family: sans-serif; text-transform: uppercase; }
        
        .vu-meter { 
            display: flex; gap: 2px; height: 25px; background: #000; padding: 3px; 
            border-top: 2px solid #808080; border-left: 2px solid #808080;
            border-bottom: 2px solid #fff; border-right: 2px solid #fff;
        }
        .led { flex: 1; background: #1a1a1a; border-right: 1px solid #333; }
        .led.on-g { background: #0f0; box-shadow: 0 0 8px #0f0; } 
        .led.on-y { background: #ff0; box-shadow: 0 0 8px #ff0; } 
        .led.on-r { background: #f00; box-shadow: 0 0 10px #f00; }

        /* --- RED VU TOGGLE --- */
        .vu-toggle-container { text-align: center; min-width: 60px; }
        .vu-toggle-label { color: #000; font-size: 8px; font-weight: bold; display: block; margin-bottom: 5px; font-family: sans-serif; }
        .red-switch {
            appearance: none; width: 40px; height: 20px; background: #440000;
            border: 2px solid #808080; cursor: pointer; position: relative;
            outline: none; transition: background 0.2s;
        }
        .red-switch:checked { background: #ff0000; box-shadow: 0 0 5px #ff0000; }
        .red-switch::after {
            content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px;
            background: #c0c0c0; border: 2px outset #fff; transition: 0.2s;
        }
        .red-switch:checked::after { left: 22px; }

    </style>
</head>
<body>

<header><h1>General desEchos</h1></header>

<div class="stack-container">
    <section class="rack-unit seg1-unit">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label">SIREN GENERATOR // SE-G1</div>
        <div class="control-grid">
            <div><span class="knob-label">PITCH</span><input type="range" id="pitchKnob" min="100" max="1500" value="440"></div>
            <div><span class="knob-label">LFO RATE</span><input type="range" id="rateKnob" min="1" max="40" value="12"></div>
            <div><span class="knob-label">DEPTH</span><input type="range" id="depthKnob" min="0" max="1500" value="600"></div>
            <div><span class="knob-label">SIREN VOL</span><input type="range" id="volKnob" min="0" max="1" step="0.05" value="0.5"></div>
        </div>
        <div style="text-align:center; margin-top:15px;">
            <div id="fireBtn" class="fire-button"></div>
        </div>
    </section>

    <section class="rack-unit mixer-container">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label">4-CH DUB MIXER / FX SENDS</div>
        <div class="mixer-grid" id="mixerUI"></div>
        
        <div class="big-knob-panel">
            <div class="rotary-dial" onclick="rotateFilter()">
                <div id="dialHand" class="dial-hand"></div>
            </div>
            <div id="freqLabel" class="freq-text">OFF</div>
        </div>

        <button id="masterBtn" style="width:100%; padding:15px; margin-top:15px; background:#040; color:#fff; border:3px outset #080; font-family:monospace; font-weight:bold; cursor:pointer;" onclick="toggleAll()">START MIXER ENGINE</button>
    </section>
</div>

<footer>
    <div class="footer-flex">
        <div class="footer-main-area">
            <div class="footer-label">SIGNAL MONITOR // PEAK LEVEL</div>
            <div class="vu-meter" id="vu"></div>
        </div>
        <div class="vu-toggle-container">
            <span class="vu-toggle-label">VU ON</span>
            <input type="checkbox" id="vuMasterToggle" class="red-switch">
        </div>
    </div>
</footer>

<script>
    let audioCtx, analyser, sirenOsc, sirenLfo, sirenLfoG, sirenG, delay, feedback, filter1, filter2;
    let isPlaying = false, isSirenEcho = false, lfoType = 'square', filterIdx = 0;
    const freqs = [0, 100, 250, 500, 1000, 2000, 4000, 8000];
    const channels = [];

    const mixerUI = document.getElementById('mixerUI');
    for(let i=0; i<4; i++) {
        const strip = document.createElement('div');
        strip.className = 'channel-strip';
        strip.innerHTML = `
            <div id="led-${i}" class="chan-led"></div>
            <label class="upload-area" id="up-box-${i}">UPLOAD<input type="file" style="display:none" onchange="loadUserFile(${i}, this)"></label>
            <div style="display:flex; justify-content:center; gap:2px;">
                <button class="s-btn" id="e-${i}" onclick="toggleFX(${i},'e')">E</button>
                <button class="s-btn" id="f-${i}" onclick="toggleFX(${i},'f')">F</button>
            </div>
            <input type="range" class="vert-fader" min="0" max="1" step="0.01" value="0.7" oninput="setVol(${i}, this.value)">
            <audio id="mix-aud-${i}" loop src="audio${i+1}.mp3" crossorigin="anonymous"></audio>
        `;
        mixerUI.appendChild(strip);
        channels.push({ gain:null, echoG:null, fltrG:null, eOn:false, fOn:false, connected:false });
    }

    function initAudio() {
        if (audioCtx && audioCtx.state !== 'suspended') return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;

        delay = audioCtx.createDelay(2.0);
        delay.delayTime.value = 0.4;
        feedback = audioCtx.createGain();
        feedback.gain.value = 0.5;
        delay.connect(feedback); feedback.connect(delay); delay.connect(analyser);

        filter1 = audioCtx.createBiquadFilter(); filter2 = audioCtx.createBiquadFilter();
        filter1.type = filter2.type = 'highpass';
        filter1.connect(filter2); filter2.connect(analyser);

        sirenOsc = audioCtx.createOscillator(); sirenLfo = audioCtx.createOscillator();
        sirenLfoG = audioCtx.createGain(); sirenG = audioCtx.createGain(); 
        sirenOsc.type = 'square'; sirenLfo.type = lfoType; sirenG.gain.value = 0;
        sirenLfo.connect(sirenLfoG); sirenLfoG.connect(sirenOsc.frequency);
        sirenOsc.connect(sirenG); sirenG.connect(analyser);
        sirenOsc.start(); sirenLfo.start();

        channels.forEach((ch, i) => {
            if (!ch.connected) {
                const audEl = document.getElementById(`mix-aud-${i}`);
                const node = audioCtx.createMediaElementSource(audEl);
                ch.gain = audioCtx.createGain();
                ch.echoG = audioCtx.createGain();
                ch.fltrG = audioCtx.createGain();
                ch.echoG.gain.value = 0; ch.fltrG.gain.value = 0;
                node.connect(ch.gain); ch.gain.connect(analyser); 
                ch.gain.connect(ch.echoG); ch.echoG.connect(delay);
                ch.gain.connect(ch.fltrG); ch.fltrG.connect(filter1);
                ch.connected = true;
                audEl.onplay = () => document.getElementById(`led-${i}`).classList.add('active');
                audEl.onpause = () => document.getElementById(`led-${i}`).classList.remove('active');
            }
        });

        analyser.connect(audioCtx.destination);
    }

    function toggleFX(i, type) {
        initAudio(); audioCtx.resume();
        if(type === 'e') {
            channels[i].eOn = !channels[i].eOn;
            channels[i].echoG.gain.value = channels[i].eOn ? 0.8 : 0;
            document.getElementById(`e-${i}`).classList.toggle('active-e');
        } else {
            channels[i].fOn = !channels[i].fOn;
            channels[i].fltrG.gain.value = channels[i].fOn ? 1 : 0;
            document.getElementById(`f-${i}`).classList.toggle('active-f');
        }
    }

    function toggleAll() {
        initAudio(); audioCtx.resume();
        isPlaying = !isPlaying;
        document.getElementById('masterBtn').innerText = isPlaying ? "STOP ENGINE" : "START ENGINE";
        channels.forEach((ch, i) => {
            const aud = document.getElementById(`mix-aud-${i}`);
            isPlaying ? aud.play() : aud.pause();
        });
    }

    function startVULoop() {
        const vu = document.getElementById('vu'); 
        vu.innerHTML = '';
        const leds = [];
        const numLeds = 20;
        for(let i=0; i<numLeds; i++) {
            const l = document.createElement('div'); l.className = 'led'; vu.appendChild(l); leds.push(l);
        }

        function draw() {
            let vol = 0;
            const isToggleOn = document.getElementById('vuMasterToggle').checked;

            if (isToggleOn && analyser) {
                const data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);
                let sum = 0;
                for(let i=0; i<data.length; i++) sum += data[i];
                vol = sum / data.length;
            }

            const lit = Math.min(numLeds, Math.floor((vol / 55) * numLeds)); 
            leds.forEach((l, i) => {
                l.className = 'led';
                if(i < lit) {
                    if(i < 12) l.classList.add('on-g');
                    else if(i < 17) l.classList.add('on-y');
                    else l.classList.add('on-r');
                }
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    // Initialize VU Loop on load
    window.onload = startVULoop;

    // Red Toggle Logic: Must initialize audio context if it's the first interaction
    document.getElementById('vuMasterToggle').onchange = function() {
        if(this.checked) {
            initAudio();
            if(audioCtx) audioCtx.resume();
        }
    };

    function rotateFilter() { initAudio(); audioCtx.resume(); filterIdx = (filterIdx + 1) % freqs.length; const f = freqs[filterIdx]; document.getElementById('dialHand').style.transform = `rotate(${filterIdx * 45}deg)`; document.getElementById('freqLabel').innerText = f === 0 ? "OFF" : f + "Hz"; filter1.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.05); filter2.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.05); }
    function loadUserFile(i, input) { const file = input.files[0]; if(file) { document.getElementById(`mix-aud-${i}`).src = URL.createObjectURL(file); } }
    function setVol(i, v) { if(channels[i].gain) channels[i].gain.gain.value = v; }
    const fireBtn = document.getElementById('fireBtn');
    fireBtn.onmousedown = fireBtn.ontouchstart = (e) => { if(e) e.preventDefault(); initAudio(); audioCtx.resume().then(() => { sirenG.gain.setTargetAtTime(document.getElementById('volKnob').value, audioCtx.currentTime, 0.02); }); };
    window.onmouseup = window.ontouchend = () => { if(sirenG) sirenG.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); };
    document.getElementById('pitchKnob').oninput = (e) => { if(sirenOsc) sirenOsc.frequency.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.05); };
    document.getElementById('rateKnob').oninput = (e) => { if(sirenLfo) sirenLfo.frequency.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.05); };
    document.getElementById('depthKnob').oninput = (e) => { if(sirenLfoG) sirenLfoG.gain.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.05); };
</script>
</body>
</html>
