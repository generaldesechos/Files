<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>General desEchos v1.0</title>
    <style>
        /* --- CORE STYLE --- */
        body {
            background-color: #004488;
            background-image: linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: "Courier New", monospace;
            margin: 0;
            padding: 20px 0 140px 0;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        header {
            border: 4px double #ffcc00;
            background: #222;
            padding: 15px;
            text-align: center;
            box-shadow: 6px 6px 0px #000;
            margin: 0 15px 30px 15px;
        }

        h1 {
            color: #ffcc00;
            margin: 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- SE-G1 UNIT CHASSIS --- */
        .seg1-unit {
            background: #c0c0c0;
            border: 6px outset #eee;
            color: #222;
            max-width: 340px;
            margin: 0 auto;
            padding: 20px;
            box-shadow: 12px 12px 0px rgba(0,0,0,0.5);
            position: relative;
        }

        .unit-label {
            background: #333;
            color: #ffcc00;
            padding: 5px;
            text-align: center;
            font-weight: bold;
            border: 2px inset #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* --- CONTROLS --- */
        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .knob-container {
            text-align: center;
            font-size: 10px;
            font-weight: bold;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #880000;
        }

        .trigger-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .fire-button {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ff0000, #880000);
            border: 5px outset #ff6666;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 5px 0 #440000;
        }

        .fire-button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #440000;
            border-style: inset;
        }

        .fx-btn {
            background: #444;
            color: #00ff00;
            border: 3px outset #666;
            padding: 10px;
            font-size: 10px;
            font-family: "Courier New", monospace;
            width: 100%;
            cursor: pointer;
        }

        .fx-btn.active {
            background: #00ff00;
            color: #000;
            border-style: inset;
        }

        /* --- FOOTER --- */
        footer {
            position: fixed;
            bottom: 0; left: 0;
            width: 100vw;
            background: #c0c0c0;
            border-top: 5px outset #fff;
            padding: 10px 15px;
            box-sizing: border-box;
            z-index: 9999;
            height: 100px;
        }

        .vu-meter {
            display: flex;
            gap: 3px;
            height: 25px;
            background: #000;
            padding: 4px;
            border: 3px inset #808080;
        }

        .led { flex: 1; background: #222; transition: background 0.05s; }
        .led.green.on { background: #33ff33; box-shadow: 0 0 8px #00ff00; }
        .led.yellow.on { background: #ffff33; box-shadow: 0 0 8px #ffff00; }
        .led.red.on { background: #ff3333; box-shadow: 0 0 8px #ff0000; }

        .bolt { position: absolute; width: 8px; height: 8px; background: #888; border-radius: 50%; border: 1px solid #444; }
        .tl { top: 6px; left: 6px; } .tr { top: 6px; right: 6px; } .bl { bottom: 6px; left: 6px; } .br { bottom: 6px; right: 6px; }
    </style>
</head>
<body>

<header>
    <h1>General desEchos</h1>
</header>

<main>
    <section class="seg1-unit">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label">GENERAL desECHOS // SE-G1 MOD</div>

        <div class="control-grid">
            <div class="knob-container">
                PITCH
                <input type="range" id="pitchKnob" min="100" max="1200" value="440">
            </div>
            <div class="knob-container">
                LFO RATE
                <input type="range" id="rateKnob" min="1" max="30" value="10">
            </div>
            <div class="knob-container">
                LFO DEPTH
                <input type="range" id="depthKnob" min="0" max="1200" value="600">
            </div>
            <div class="knob-container">
                ECHO F.BACK
                <input type="range" id="echoKnob" min="0" max="0.9" step="0.1" value="0.5">
            </div>
        </div>

        <div class="trigger-section">
            <div id="fireBtn" class="fire-button"></div>
            <div style="display:flex; gap:10px; width:100%;">
                <button id="delayToggle" class="fx-btn">ECHO UNIT</button>
                <button id="modeToggle" class="fx-btn">LFO: SQUARE</button>
            </div>
        </div>
    </section>
</main>

<footer>
    <div style="color:#000; font-size:10px; font-weight:bold; margin-bottom:5px; text-transform: uppercase;">Signal Monitor : General desEchos Output</div>
    <div class="vu-meter" id="vu"></div>
</footer>

<script>
    let audioCtx, osc, lfo, lfoGain, mainGain, delay, feedback, analyser;
    let isEcho = false;
    let lfoType = 'square';

    const fireBtn = document.getElementById('fireBtn');
    const delayToggle = document.getElementById('delayToggle');
    const modeToggle = document.getElementById('modeToggle');
    const vuContainer = document.getElementById('vu');
    const leds = [];

    // Create VU LEDs
    for(let i=0; i<24; i++) {
        const led = document.createElement('div');
        led.className = 'led ' + (i < 14 ? 'green' : i < 20 ? 'yellow' : 'red');
        vuContainer.appendChild(led);
        leds.push(led);
    }

    function init() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        osc = audioCtx.createOscillator();
        lfo = audioCtx.createOscillator();
        lfoGain = audioCtx.createGain();
        mainGain = audioCtx.createGain();
        analyser = audioCtx.createAnalyser();
        
        // Delay Hardware
        delay = audioCtx.createDelay(2.0);
        feedback = audioCtx.createGain();
        delay.delayTime.value = 0.35;
        feedback.gain.value = document.getElementById('echoKnob').value;
        
        osc.type = 'square'; 
        lfo.type = lfoType;
        mainGain.gain.value = 0;
        
        // Signal Flow
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        osc.connect(mainGain);
        mainGain.connect(analyser);
        analyser.connect(audioCtx.destination);
        
        // Echo Feedback Loop
        delay.connect(feedback);
        feedback.connect(delay);

        osc.start();
        lfo.start();
        drawVU();
    }

    function drawVU() {
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const volume = data.reduce((a,b) => a+b) / data.length;
        const litLeds = Math.floor((volume / 160) * leds.length);
        leds.forEach((led, i) => led.classList.toggle('on', i < litLeds));
        requestAnimationFrame(drawVU);
    }

    // Controls
    fireBtn.addEventListener('mousedown', () => {
        init();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        mainGain.gain.setTargetAtTime(0.5, audioCtx.currentTime, 0.02);
    });

    window.addEventListener('mouseup', () => {
        if(mainGain) mainGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
    });

    fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); init(); mainGain.gain.setTargetAtTime(0.5, audioCtx.currentTime, 0.02); });
    window.addEventListener('touchend', () => { if(mainGain) mainGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); });

    document.getElementById('pitchKnob').oninput = (e) => { if(osc) osc.frequency.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.05); };
    document.getElementById('rateKnob').oninput = (e) => { if(lfo) lfo.frequency.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.05); };
    document.getElementById('depthKnob').oninput = (e) => { if(lfoGain) lfoGain.gain.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.05); };
    document.getElementById('echoKnob').oninput = (e) => { if(feedback) feedback.gain.value = e.target.value; };

    delayToggle.onclick = () => {
        init();
        isEcho = !isEcho;
        delayToggle.classList.toggle('active');
        if(isEcho) {
            mainGain.connect(delay);
            delay.connect(audioCtx.destination);
        } else {
            mainGain.disconnect(delay);
        }
    };

    modeToggle.onclick = () => {
        lfoType = (lfoType === 'square') ? 'sine' : 'square';
        if(lfo) lfo.type = lfoType;
        modeToggle.innerText = "LFO: " + lfoType.toUpperCase();
    };
</script>

</body>
</html>
