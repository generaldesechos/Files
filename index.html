<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DUB SIREN v1.0</title>
    <style>
        /* --- SYSTEM CORE --- */
        body {
            background-color: #004488;
            background-image: linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: "Courier New", monospace;
            margin: 0;
            padding: 20px 0 120px 0;
            overflow-x: hidden;
            touch-action: none; /* Prevents scrolling while using siren */
        }

        header {
            border: 4px double #ffcc00;
            background: #222;
            padding: 15px;
            text-align: center;
            box-shadow: 6px 6px 0px #000;
            margin: 0 15px 20px 15px;
        }

        /* --- THE SIREN CONTROL PAD --- */
        .siren-box {
            background: #c0c0c0;
            border: 5px outset #eee;
            color: #000;
            max-width: 90%;
            margin: 0 auto 30px auto;
            padding: 30px;
            text-align: center;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            position: relative;
        }

        .siren-button {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #ff0000, #aa0000);
            border: 8px outset #ff6666;
            border-radius: 50%;
            display: inline-block;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 10px 0 #550000;
            active: transform translateY(5px);
        }

        .siren-button:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #550000;
            border-style: inset;
        }

        .label-plate {
            background: #222;
            color: #00ff00;
            padding: 5px 15px;
            display: inline-block;
            margin-bottom: 20px;
            border: 2px inset #555;
            font-size: 12px;
        }

        .instructions {
            font-size: 10px;
            margin-top: 15px;
            color: #333;
            font-weight: bold;
        }

        /* --- FOOTER --- */
        footer {
            position: fixed;
            bottom: 0; left: 0;
            width: 100vw;
            background: #c0c0c0;
            border-top: 4px outset #ffffff;
            display: flex;
            align-items: center;
            padding: 8px 15px;
            box-sizing: border-box;
            z-index: 9999;
            height: 60px;
        }

        .status-terminal {
            background: #000; color: #00ff00; border: 3px inset #808080;
            padding: 6px 10px; flex-grow: 1; overflow: hidden;
            white-space: nowrap; font-size: 12px;
        }

        .bolt { position: absolute; width: 10px; height: 10px; background: #888; border-radius: 50%; border: 1px solid #444; }
        .tl { top: 5px; left: 5px; } .tr { top: 5px; right: 5px; } .bl { bottom: 5px; left: 5px; } .br { bottom: 5px; right: 5px; }
    </style>
</head>
<body>

<header>
    <h1>⚙️ DUB_SIREN_UNIT v1.0</h1>
</header>

<main>
    <section class="siren-box">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="label-plate">OSCILLATOR_01 : READY</div>
        <br>
        <div id="sirenTrigger" class="siren-button"></div>
        <div class="instructions">
            HOLD BUTTON TO ACTIVATE<br>
            UP/DOWN = PITCH | LEFT/RIGHT = LFO SPEED
        </div>
    </section>
</main>

<footer>
    <div class="status-terminal">
        <marquee scrollamount="5" id="status-text">SYSTEM STANDBY... READY TO BLAST...</marquee>
    </div>
</footer>

<script>
    let audioCtx;
    let mainOsc;
    let lfo;
    let gainNode;

    const trigger = document.getElementById('sirenTrigger');
    const statusText = document.getElementById('status-text');

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Setup Nodes
        mainOsc = audioCtx.createOscillator();
        lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();
        gainNode = audioCtx.createGain();

        // Settings
        mainOsc.type = 'square'; // Classic Dub Siren sound
        lfo.type = 'sine';
        lfoGain.gain.value = 200; // Depth of the wobble
        gainNode.gain.value = 0;

        // Connections
        lfo.connect(lfoGain);
        lfoGain.connect(mainOsc.frequency); // LFO modulates the Pitch
        mainOsc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        mainOsc.start();
        lfo.start();
    }

    function startSiren(e) {
        if (!audioCtx) initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        gainNode.gain.setTargetAtTime(0.5, audioCtx.currentTime, 0.05);
        statusText.innerText = ">>> WARNING: HIGH DECIBEL SIGNAL ACTIVE <<<";
        updateSirenParams(e);
    }

    function stopSiren() {
        if (gainNode) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
        statusText.innerText = "SYSTEM STANDBY... READY TO BLAST...";
    }

    function updateSirenParams(e) {
        if (!audioCtx || gainNode.gain.value === 0) return;

        // Support both mouse and touch
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);

        const width = window.innerWidth;
        const height = window.innerHeight;

        // Y Axis = Base Pitch (200Hz to 1500Hz)
        const pitch = 1500 - ((clientY / height) * 1300);
        mainOsc.frequency.setTargetAtTime(pitch, audioCtx.currentTime, 0.1);

        // X Axis = LFO Speed (0.5Hz to 20Hz)
        const speed = (clientX / width) * 20;
        lfo.frequency.setTargetAtTime(speed, audioCtx.currentTime, 0.1);
    }

    // Event Listeners
    trigger.addEventListener('mousedown', startSiren);
    trigger.addEventListener('touchstart', (e) => { e.preventDefault(); startSiren(e); });

    window.addEventListener('mouseup', stopSiren);
    window.addEventListener('touchend', stopSiren);

    window.addEventListener('mousemove', updateSirenParams);
    window.addEventListener('touchmove', (e) => { updateSirenParams(e); });

</script>

</body>
</html>
