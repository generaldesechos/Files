<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>General desEchos v4.7 - Final Gate</title>
    <style>
        body { background: #004488; color: #fff; font-family: "Courier New", monospace; margin: 0; padding: 10px 0 120px 0; touch-action: none; }
        header { border: 4px double #fff; background: #222; padding: 10px; text-align: center; margin: 0 15px 15px; box-shadow: 4px 4px 0px #000; }
        .stack { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 95%; margin: 0 auto; }
        .unit { background: #444; border: 5px outset #888; width: 100%; max-width: 550px; padding: 15px; position: relative; box-sizing: border-box; }
        .unit-label { background: #111; color: #fc0; text-align: center; font-size: 10px; padding: 4px; border: 1px solid #444; margin-bottom: 12px; font-weight: bold; }
        .bolt { position: absolute; width: 8px; height: 8px; background: #666; border-radius: 50%; border: 1px solid #333; }
        .tl { top: 8px; left: 8px; } .tr { top: 8px; right: 8px; } .bl { bottom: 8px; left: 8px; } .br { bottom: 8px; right: 8px; }

        /* D-PAD */
        .dpad-area { width: 120px; height: 120px; background: #222; margin: 10px auto; border-radius: 50%; position: relative; border: 4px inset #000; }
        .cross-v { position: absolute; left: 45px; top: 15px; width: 30px; height: 90px; background: #111; }
        .cross-h { position: absolute; left: 15px; top: 45px; width: 90px; height: 30px; background: #111; }
        #dot { position: absolute; width: 10px; height: 10px; background: red; border-radius: 50%; display: none; }

        /* SE-G1 SIREN */
        .seg1 { background: #b08d57; color: #000; }
        .fire-button { width: 55px; height: 55px; background: radial-gradient(circle, #f00, #800); border: 4px outset #f66; border-radius: 50%; cursor: pointer; margin: 10px auto; display: block; }
        .knob-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 9px; font-weight: bold; text-transform: uppercase; }

        /* MIXER */
        .mixer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .chan { background: #333; border: 2px inset #222; padding: 8px; text-align: center; }
        .upload-area { font-size: 7px; background: #000; color: #0f0; padding: 4px; border: 1px solid #333; display: block; margin-bottom: 5px; cursor: pointer; }
        .fader { appearance: slider-vertical; width: 16px; height: 70px; }
        .s-btn { font-size: 8px; padding: 3px; background: #222; color: #fff; border: 2px outset #666; cursor: pointer; width: 32px; margin: 1px; }
        .active-m { background: #f00 !important; } .active-s { background: #0080ff !important; }

        footer { position: fixed; bottom: 0; width: 100%; background: #c0c0c0; border-top: 2px solid #fff; height: 90px; padding: 10px; box-sizing: border-box; z-index: 1000; display: flex; align-items: center; gap: 10px;}
        #vu { height: 25px; background: #000; display: flex; gap: 2px; border: 2px inset #808080; flex-grow: 1; }
    </style>
</head>
<body>

<header><h1>General desEchos v4.7</h1></header>

<div class="stack">
    <div class="unit" style="background: #555;">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label">RICOH RP2A03 // PERFORMANCE D-PAD</div>
        <div class="dpad-area" id="dpad">
            <div class="cross-v"></div><div class="cross-h"></div><div id="dot"></div>
        </div>
        <div class="knob-row">
            <div>BASE PITCH <input type="range" id="nPit" min="400" max="1200" value="987"></div>
            <div>COIN DECAY <input type="range" id="nDec" min="0.05" max="0.8" step="0.05" value="0.2"></div>
        </div>
    </div>

    <div class="unit seg1">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label" style="color:#000; border-color:#000;">SIREN GENERATOR // SE-G1</div>
        <div class="knob-row">
            <div>PITCH <input type="range" id="sPit" min="100" max="1500" value="440"></div>
            <div>LFO RATE <input type="range" id="sRat" min="1" max="50" value="12"></div>
            <div>LFO DEPTH <input type="range" id="sDep" min="0" max="1000" value="300"></div>
            <div>AMP DECAY <input type="range" id="sDec" min="0.1" max="2.0" step="0.1" value="0.5"></div>
        </div>
        <div style="text-align:center; margin-top:10px;">
            <div id="sFire" class="fire-button"></div>
            <button id="sWave" style="font-size:8px; padding:4px; background:#333; color:#fff; cursor:pointer;">WAVE: SQUARE</button>
        </div>
    </div>

    <div class="unit">
        <div class="bolt tl"></div><div class="bolt tr"></div><div class="bolt bl"></div><div class="bolt br"></div>
        <div class="unit-label">4-CH DUB MIXER</div>
        <div class="mixer-grid" id="mGrid"></div>
        <button id="masterBtn" style="width:100%; padding:15px; margin-top:15px; background:#040; color:#fff; font-weight:bold; cursor:pointer;" onclick="bootSystem()">BOOT MIX ENGINE</button>
    </div>
</div>

<footer>
    <div id="vu"></div>
    <div style="text-align:center;"><span style="font-size:8px; font-weight:bold; color:#000;">VU</span><br><input type="checkbox" id="vuTog" checked></div>
</footer>

<script>
    let ctx, analyser, sirenO, sirenL, sirenLG, sirenG, nesO, nesG, channels = [];
    let isBooted = false, lfoType = 'square';

    function bootSystem() {
        if (isBooted) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = ctx.createAnalyser(); 
        
        // Siren Wiring
        sirenO = ctx.createOscillator(); sirenL = ctx.createOscillator();
        sirenLG = ctx.createGain(); sirenG = ctx.createGain();
        sirenO.type = 'square'; sirenG.gain.value = 0;
        sirenL.connect(sirenLG); sirenLG.connect(sirenO.frequency);
        sirenO.connect(sirenG); sirenG.connect(analyser);
        sirenO.start(); sirenL.start();

        const g = document.getElementById('mGrid'); g.innerHTML = '';
        for(let i=0; i<4; i++) {
            const d = document.createElement('div'); d.className='chan';
            d.innerHTML = `<label class="upload-area">LOAD<input type="file" style="display:none" onchange="loadF(${i},this)"></label>
                <button class="s-btn" id="m-${i}" onclick="tog(${i},'m')">M</button>
                <button class="s-btn" id="s-${i}" onclick="tog(${i},'s')">S</button><br>
                <input type="range" class="fader" oninput="setV(${i},this.value)" min="0" max="1" step="0.01" value="0.7">
                <audio id="a${i}" loop crossorigin="anonymous"></audio>`;
            g.appendChild(d);
            const node = ctx.createMediaElementSource(document.getElementById(`a${i}`));
            const gn = ctx.createGain(); node.connect(gn); gn.connect(analyser);
            channels.push({gn, aud: document.getElementById(`a${i}`), mOn:0, sOn:0, vol:0.7});
        }
        analyser.connect(ctx.destination);
        isBooted = true; document.getElementById('masterBtn').style.background = "#333";
        startVU();
    }

    // NES D-PAD LOGIC
    const dp = document.getElementById('dpad'), dot = document.getElementById('dot');
    let dAct = false;

    const startN = (e) => { if(!ctx) return; e.preventDefault(); dAct = true; dot.style.display='block'; trigN(); moveN(e.touches?.[0] || e); };
    const stopN_logic = () => { if(!dAct) return; dAct = false; dot.style.display='none'; if(nesG){ nesG.gain.setTargetAtTime(0, ctx.currentTime, 0.05); nesO.stop(ctx.currentTime + 0.1); }};

    dp.addEventListener('mousedown', startN); dp.addEventListener('touchstart', startN);
    window.addEventListener('mousemove', (e) => dAct && moveN(e));
    window.addEventListener('touchmove', (e) => dAct && moveN(e.touches[0]));
    window.addEventListener('mouseup', stopN_logic); window.addEventListener('touchend', stopN_logic);

    function trigN() {
        const r = parseFloat(document.getElementById('nPit').value);
        nesO = ctx.createOscillator(); nesG = ctx.createGain();
        nesO.type = 'square'; nesO.connect(nesG); nesG.connect(analyser);
        nesO.frequency.setValueAtTime(r, ctx.currentTime);
        nesO.frequency.setValueAtTime(r * 1.334, ctx.currentTime + 0.08); // Coin jump
        nesG.gain.setValueAtTime(0.3, ctx.currentTime);
        nesO.start();
    }
    function moveN(e) {
        const r = dp.getBoundingClientRect();
        const y = (e.clientY - r.top) / r.height;
        dot.style.left = ((e.clientX - r.left) / r.width * 100) + '%';
        dot.style.top = (y * 100) + '%';
        if(nesO) {
            const rt = parseFloat(document.getElementById('nPit').value) * 1.334;
            nesO.frequency.setTargetAtTime(rt + ((0.5 - y) * rt), ctx.currentTime, 0.05);
        }
    }

    // SIREN GATING
    const sf = document.getElementById('sFire');
    sf.onmousedown = sf.ontouchstart = (e) => { e.preventDefault(); if(!ctx) return; sirenG.gain.setTargetAtTime(0.5, ctx.currentTime, 0.02); };
    const stopSiren = () => { if(sirenG) sirenG.gain.setTargetAtTime(0, ctx.currentTime, parseFloat(document.getElementById('sDec').value)); };
    window.addEventListener('mouseup', stopSiren); window.addEventListener('touchend', stopSiren);

    document.getElementById('sWave').onclick = () => { lfoType = lfoType === 'square' ? 'sine' : 'square'; if(sirenL) sirenL.type = lfoType; document.getElementById('sWave').innerText = "WAVE: " + lfoType.toUpperCase(); };
    document.getElementById('sPit').oninput = (e) => { if(sirenO) sirenO.frequency.value = e.target.value; };
    document.getElementById('sRat').oninput = (e) => { if(sirenL) sirenL.frequency.value = e.target.value; };
    document.getElementById('sDep').oninput = (e) => { if(sirenLG) sirenLG.gain.value = e.target.value; };

    // MIXER
    function tog(i, t) { channels[i][t+'On'] = !channels[i][t+'On']; document.getElementById(`${t}-${i}`).classList.toggle(`active-${t}`); updateMix(); }
    function updateMix() { const anyS = channels.some(c => c.sOn); channels.forEach(c => { c.gn.gain.value = c.mOn ? 0 : (anyS && !c.sOn ? 0 : c.vol); }); }
    function setV(i,v) { channels[i].vol = v; updateMix(); }
    function loadF(i,inp) { if(inp.files[0]) { channels[i].aud.src = URL.createObjectURL(inp.files[0]); channels[i].aud.play(); } }

    function startVU() {
        const v = document.getElementById('vu');
        setInterval(() => {
            if(!document.getElementById('vuTog').checked) return;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            const avg = data.reduce((a,b)=>a+b)/data.length;
            v.innerHTML = '';
            for(let i=0; i<20; i++) {
                const l = document.createElement('div'); l.style.flex = "1";
                l.style.background = (i < avg/4) ? (i<14?"#0f0":"#f00") : "#111";
                v.appendChild(l);
            }
        }, 50);
    }
</script>
</body>
</html>
